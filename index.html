.lc{background:var(--white);border-radius:var(--rl);padding:48px 44px;width:420px;box-shadow:var(--shlg);position:relative;z-index:1}
.lc .mark{text-align:center;margin-bottom:32px}
.lc .mark .m{display:inline-flex;align-items:center;background:var(--navy);color:var(--gold);

.lc h2{font-size:22px;font-weight:600;margin-bottom:24px;color:var(--navy)}
.fg{margin-bottom:18px}
.fg label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px}
.fg input{width:100%;padding:11px 14px;border:1.5px solid var(--bdr);border-radius:8px;

.fg input:focus{outline:none;border-color:var(--navy)}
.btnl{width:100%;padding:13px;background:var(--navy);color:var(--gold);border:none;border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s}
.btnl:hover{background:var(--navyl)}

#app{display:none;flex-direction:column;min-height:100vh}
.tb{background:var(--navy);height:56px;display:flex;align-items:center;padding:0 24px;gap:16px;

.tbr{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
.up{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;

<script>
// ─── SUPABASE CONNECTION ─────────────────────────────────────────────────────
const SUPA_URL = 'https://vuwcnqvrgmdknvbajhtt.supabase.co';
const SUPA_KEY = 'sb_publishable_Pr4OYz2a2rvhEtRjH_Nqkg_8PHTIeCb';
const DB = supabase.createClient(SUPA_URL, SUPA_KEY);

// ─── DB HELPERS ───────────────────────────────────────────────────────────────
// All data operations go through these — swaps localStorage for Supabase
const S = {
  // Local cache for fast reads (synced from Supabase on login)
  _cache: {},

  get(k) {
    // Return from cache first
    if (this._cache[k] !== undefined) return this._cache[k];
    // Fallback to localStorage during offline/init
    try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; }
  },

  set(k, v) {
    // Write to both cache and localStorage (Supabase writes happen via dbSet)
    this._cache[k] = v;
    try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
  },

  // Async Supabase read — called on login to warm cache
  async dbGet(table) {
    try {
      const { data, error } = await DB.from(table).select('*');
      if (error) throw error;
      return data || [];
    } catch(e) {
      console.warn('DB read failed, using cache:', e.message);
      return this.get('lhs:' + table) || [];
    }
  },

  // Async Supabase write
  async dbInsert(table, row) {
    try {
      const { data, error } = await DB.from(table).insert(row).select();
      if (error) throw error;
      return data?.[0];
    } catch(e) {
      console.warn('DB insert failed:', e.message);
      return null;
    }
  },

  async dbUpdate(table, id, updates) {
    try {
      const { error } = await DB.from(table).update(updates).eq('id', id);
      if (error) throw error;
      return true;
    } catch(e) {
      console.warn('DB update failed:', e.message);
      return false;
    }
  },

  async dbDelete(table, id) {
    try {
      const { error } = await DB.from(table).delete().eq('id', id);
      if (error) throw error;
      return true;
    } catch(e) {
      console.warn('DB delete failed:', e.message);
      return false;
    }
  },

  // Warm cache from Supabase on login
  async warmCache() {
    const tables = ['lhs_users','lhs_items','lhs_location_stock','lhs_van_inventory',
      'lhs_locations','lhs_divisions','lhs_vendors','lhs_purchase_orders',
      'lhs_po_lines','lhs_transfers','lhs_testers','lhs_customers',
      'lhs_work_orders','lhs_schedule'];
    await Promise.all(tables.map(async t => {
      const data = await this.dbGet(t);
      const key = 'lhs:' + t.replace('lhs_','');
      this._cache[key] = data;
      try { localStorage.setItem(key, JSON.stringify(data)); } catch {}
    }));
    console.log('Cache warmed from Supabase');
  }
};
</script>

// ─── AUTH ────────────────────────────────────────────────────────────────────
let CU=null;

async function doLogin(){
  const u=document.getElementById('lu').value.trim().toLowerCase();
  const p=document.getElementById('lp').value.trim();
  // Check hardcoded USERS first (fast), then Supabase
  let user=USERS.find(x=>x.email.toLowerCase()===u&&x.pw===p);
  if(!user){
    try{
      const {data}=await DB.from('lhs_users').select('*')
        .eq('email',u).eq('password_hash',p).eq('active',true).single();
      if(data) user={name:data.name,email:data.email,pw:data.password_hash,role:data.role,loc:data.home_location};
    }catch{}
  }
  if(!user){document.getElementById('lerr').style.display='block';return}
  CU=user;
  sessionStorage.setItem('lhs_s',JSON.stringify({e:user.email,p:user.pw}));
  startApp();
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('ls').style.display!=='none') doLogin();
});

function doLogout(){
  CU=null; sessionStorage.removeItem('lhs_s');
  document.getElementById('app').style.display='none';
  document.getElementById('ls').style.display='flex';
  document.getElementById('lp').value='';
  document.getElementById('lerr').style.display='none';
}

// Restore session on browser refresh
window.addEventListener('DOMContentLoaded',()=>{
  const s=sessionStorage.getItem('lhs_s');
  if(s){
    try{
      const d=JSON.parse(s);
      const user=USERS.find(x=>x.email===d.e&&x.pw===d.p);
      if(user){CU=user;startApp();return}
    }catch{}
  }
  document.getElementById('ls').style.display='flex';
});

function startApp(){
  document.getElementById('ls').style.display='none';
  // Warm cache from Supabase in background (non-blocking)
  S.warmCache().catch(e => console.warn('Cache warm failed:', e));
  document.getElementById('app').style.display='flex';
  document.getElementById('un').textContent=CU.name.split(' ')[0];
  document.getElementById('ur').textContent=CU.role==='God View'?'ADMIN':CU.role.toUpperCase().replace(' ','_');
  seed(); buildNav(); showPage('dashboard');
}

function genPOId(){
  const now=new Date();
  const mm=String(now.getMonth()+1).padStart(2,'0');
  const dd=String(now.getDate()).padStart(2,'0');
  const yy=String(now.getFullYear()).slice(-2);
  const dateStr=`${mm}/${dd}/${yy}`;
  // Get next global sequence number (never resets, never duplicates)
  let seq=(S.get('lhs:poseq')||0)+1;
  S.set('lhs:poseq',seq);
  return `PO - ${dateStr} - ${String(seq).padStart(4,'0')}`;
}

// ─── RECEIVE ─────────────────────────────────────────────────────────────────
function bRecv(){
  const pos=S.get('lhs:pos')||[];
  const op=pos.filter(p=>['Pending','Partial - Awaiting Balance'].includes(p.status));
  return`<div class="pt">Receive Inventory</div><div class="ps">Select a PO &#8594; confirm quantities &#8594; post to stock</div>
  <div class="card"><div class="fr">
    <div class="fl"><label>Select PO</label><select id="rsel" onchange="lRecv()">
      <option value="">&#8212; Select PO &#8212;</option>
      ${op.map(p=>`<option value="${pos.indexOf(p)}">${p.id} &#8212; ${p.vendor} &#8594; ${p.location}</option>`).join('')}
    </select></div>
    <div class="fl"><label>Received By</label><input id="rby" value="${CU.name}" readonly style="background:#f5f5f5"></div>
    <div class="fl"><label>Date</label><input type="date" id="rdt" value="${td()}"></div>
  </div></div>
  <div id="rlines"></div>`;
}
function lRecv(){
  const sel=g('rsel');const idx=parseInt(sel.value);
  if(isNaN(idx)){document.getElementById('rlines').innerHTML='';return}
  const pos=S.get('lhs:pos')||[];const p=pos[idx];
  document.getElementById('rlines').innerHTML=`<div class="card">
  <div class="sh"><h3>PO ${p.id} &#8212; ${p.vendor} &#8594; ${p.location}</h3></div>
  <div class="tw" style="margin-bottom:16px"><table><thead><tr><th>Item</th><th>Ordered</th><th>Prev</th><th>Receive Now</th><th>Balance</th></tr></thead>
  <tbody>${(p.lines||[]).map((l,i)=>`<tr>
    <td style="font-weight:500">${l.item||l.sku}</td><td>${l.qtyOrdered}</td><td>${l.qtyReceived||0}</td>
    <td><input type="number" id="rl${i}" value="${l.qtyOrdered-(l.qtyReceived||0)}" min="0"
      style="width:70px;padding:6px 8px;border:1.5px solid var(--bdr);border-radius:6px;font-size:14px;text-align:center"
      oninput="uBal(${i},${l.qtyOrdered},${l.qtyReceived||0})"></td>
    <td id="bal${i}" style="color:var(--amber);font-family:'DM Mono',monospace">${l.qtyOrdered-(l.qtyReceived||0)} left</td>
  </tr>`).join('')}</tbody></table></div>
  <div class="br2"><button class="btn btn-n" onclick="postRecv(${idx})">&#10003; Post to Stock</button>
  <button class="btn btn-o" onclick="document.getElementById('rlines').innerHTML=''">Cancel</button></div>
  </div>`;
}
function uBal(i,o,pr){const now=pi2('rl'+i);const bal=o-pr-now;const el=g('bal'+i);
  if(el){el.textContent=bal>0?bal+' left':'&#10003; Done';el.style.color=bal>0?'var(--amber)':'var(--green)';}}
function postRecv(pi3){
  const pos=S.get('lhs:pos')||[];const ls=S.get('lhs:ls')||[];const p=pos[pi3];let short=false;
  const dt=v('rdt');
  (p.lines||[]).forEach((l,i)=>{
    const now=pi2('rl'+i);
    l.qtyReceived=(l.qtyReceived||0)+now;
    l.status=l.qtyReceived>=l.qtyOrdered?'Received':'Short';
    if(l.status==='Short') short=true;
    if(now>0){const ex=ls.find(r=>r.sku===l.sku&&r.location===p.location);
      if(ex) ex.qty+=now; else ls.push({sku:l.sku,item:l.item,location:p.location,qty:now,min:0,max:0,bin:''});}
  });
  p.status=(p.lines||[]).every(l=>l.status==='Received')?'Received in Full':'Partial - Awaiting Balance';
  p.receivedDate=dt;p.receivedBy=CU.name;
  p.receiptValue=(p.lines||[]).reduce((s,l)=>s+(l.qtyReceived||0)*l.cost,0);
  if(short) p.notes='Short: '+(p.lines||[]).filter(l=>l.status==='Short')
    .map(l=>`${l.item} (${l.qtyReceived}/${l.qtyOrdered})`).join(', ');
  pos[pi3]=p; S.set('lhs:pos',pos); S.set('lhs:ls',ls);
  tst(p.status==='Received in Full'?`${p.id} fully received`:`${p.id} partial — balance due`,
    p.status==='Received in Full'?'success':'info');
  showPage('receive');
}

// ─── TRANSFER ────────────────────────────────────────────────────────────────
let _xl=[],_xi=[];
function bXfr(){
  const xfrs=S.get('lhs:xfrs')||[];
  return`<div class="pt">Vehicle Transfer</div><div class="ps">Move inventory between warehouses and vehicles</div>
  <div class="card"><div class="ct">New Transfer</div>
  <div class="fr">
    <div class="fl"><label>From</label><select id="xf" onchange="xUpA()">
      <option value="">&#8212; Source &#8212;</option>
      ${WH.map(w=>`<option value="${w}">${w} (Warehouse)</option>`).join('')}
      ${VH.map(v=>`<option value="${v}">${v}</option>`).join('')}
    </select></div>
    <div class="fl"><label>To</label><select id="xt">
      <option value="">&#8212; Destination &#8212;</option>
      ${WH.map(w=>`<option value="${w}">${w} (Warehouse)</option>`).join('')}
      ${VH.map(v=>`<option value="${v}">${v}</option>`).join('')}
    </select></div>
    <div class="fl"><label>Reason</label><select id="xr">
      <option>Van Restock</option><option>Warehouse to Van</option><option>Van to Warehouse</option>
      <option>Van to Van</option><option>Return</option>
    </select></div>
  </div>
  <div style="margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <label style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase">Items</label>
      <button class="btn sm btn-o" onclick="addXL()">+ Add Item</button>
    </div>
    <div class="tw"><table class="lt"><thead><tr><th>Item</th><th>SKU</th><th>Available</th><th>Qty</th><th></th></tr></thead>
    <tbody id="xtb"></tbody></table></div>
  </div>
  <div class="fl" style="margin-bottom:16px"><label>Notes</label><input id="xn" placeholder="Optional"></div>
  <div class="br2">
    <button class="btn btn-n" onclick="postXfr()">&#9654; Log Transfer</button>
    <button class="btn btn-g" onclick="restMax()">&#9889; Restock Van to Max</button>
  </div></div>
  <div class="card"><div class="ct">Transfer History</div>
  <div class="tw"><table><thead><tr><th>Date</th><th>From</th><th>To</th><th>Item</th><th>Qty</th><th>Reason</th><th>By</th></tr></thead>
  <tbody>${xfrs.length?[...xfrs].reverse().slice(0,20).map(t=>`<tr>
    <td style="font-size:12px;color:var(--muted)">${t.date}</td><td>${t.from}</td><td>${t.to}</td>
    <td style="font-weight:500">${t.item}</td>
    <td style="font-family:'DM Mono',monospace;font-weight:700">${t.qty}</td>
    <td style="color:var(--muted);font-size:12px">${t.reason}</td>
    <td style="color:var(--muted);font-size:12px">${t.by||'&#8212;'}</td>
  </tr>`).join(''):'<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:16px">No transfers yet</td></tr>'}
  </tbody></table></div></div>`;
}
function addXL(){
  if(!_xi.length) _xi=S.get('lhs:items')||[];
  const idx=_xl.length; _xl.push({sku:'',item:'',qty:1});
  const tb=g('xtb'); if(!tb) return;
  const tr=document.createElement('tr'); tr.id='xl'+idx;
  tr.innerHTML=`<td><select onchange="xlI(${idx},this)" style="width:160px">
    <option value="">&#8212; Select &#8212;</option>
    ${_xi.map(i=>`<option value="${i.sku}">${i.name}</option>`).join('')}
  </select></td>
  <td><input id="xls${idx}" readonly style="width:85px;background:#f5f5f5"></td>
  <td id="xla${idx}" style="font-family:'DM Mono',monospace;color:var(--muted)">&#8212;</td>
  <td><input type="number" id="xlq${idx}" value="1" min="1" style="width:55px"></td>
  <td><button class="dx" onclick="this.closest('tr').remove()">&#215;</button></td>`;
  tb.appendChild(tr);
}
function xlI(i,s){
  const it=_xi.find(x=>x.sku===s.value);
  g('xls'+i).value=s.value; _xl[i]={sku:s.value,item:it?.name||''}; xAvail(i);
}
function xAvail(i){
  const from=v('xf');const sku=_xl[i]?.sku; if(!from||!sku) return;
  let q=0;
  if(WH.includes(from)) q=(S.get('lhs:ls')||[]).find(r=>r.sku===sku&&r.location===from)?.qty||0;
  else q=(S.get('lhs:vi')||[]).find(r=>r.sku===sku&&r.vehicle===from)?.qty||0;
  const el=g('xla'+i);if(el){el.textContent=q;el.style.color=q>0?'var(--green)':'var(--red)';}
}
function xUpA(){_xl.forEach((_,i)=>xAvail(i));}
function postXfr(){
  const from=v('xf');const to=v('xt');const reason=v('xr');const notes=v('xn');
  if(!from||!to){tst('Select From and To','error');return}
  if(from===to){tst('From and To cannot match','error');return}
  const lines=_xl.filter(l=>l.sku); if(!lines.length){tst('Add at least one item','error');return}
  const ls=S.get('lhs:ls')||[];const vi=S.get('lhs:vi')||[];const xfrs=S.get('lhs:xfrs')||[];
  const errs=[];
  lines.forEach((l,i)=>{
    const qty=pi2('xlq'+i); if(!qty) return;
    if(WH.includes(from)){const r=ls.find(x=>x.sku===l.sku&&x.location===from);
      if(!r||r.qty<qty){errs.push(`Not enough ${l.item} at ${from}`);return} r.qty-=qty;
    }else{const r=vi.find(x=>x.sku===l.sku&&x.vehicle===from);
      if(!r||r.qty<qty){errs.push(`Not enough ${l.item} in ${from}`);return} r.qty-=qty;}
    if(WH.includes(to)){const r=ls.find(x=>x.sku===l.sku&&x.location===to);
      if(r) r.qty+=qty; else ls.push({sku:l.sku,item:l.item,location:to,qty,min:0,max:0,bin:''});
    }else{const r=vi.find(x=>x.sku===l.sku&&x.vehicle===to);
      if(r) r.qty+=qty; else vi.push({sku:l.sku,item:l.item,vehicle:to,division:'',qty,min:0,max:0,tech:''});}
    xfrs.push({date:td(),from,to,sku:l.sku,item:l.item,qty,reason,notes:notes||'',by:CU.name});
  });
  if(errs.length){tst(errs[0],'error');return}
  S.set('lhs:ls',ls);S.set('lhs:vi',vi);S.set('lhs:xfrs',xfrs);
  _xl=[]; tst(`${lines.length} item(s) transferred`,'success'); showPage('transfer');
}
function restMax(){
  const to=v('xt');const from=v('xf');
  if(!VH.includes(to)){tst('Select a van as destination','error');return}
  if(!WH.includes(from)){tst('Select a warehouse as source','error');return}
  const vi=S.get('lhs:vi')||[];const need=vi.filter(r=>r.vehicle===to&&r.max>0&&r.qty<r.max);
  if(!need.length){tst(`${to} is at max`,'info');return}
  _xi=S.get('lhs:items')||[];_xl=[];
  const tb=g('xtb'); if(tb) tb.innerHTML='';
  need.forEach((vi2,i)=>{
    _xl.push({sku:vi2.sku,item:vi2.item,qty:vi2.max-vi2.qty});
    const tr=document.createElement('tr'); tr.id='xl'+i;
    tr.innerHTML=`<td style="font-weight:500">${vi2.item||vi2.sku}</td>
    <td><input id="xls${i}" value="${vi2.sku}" readonly style="width:85px;background:#f5f5f5"></td>
    <td id="xla${i}" style="color:var(--green);font-family:'DM Mono',monospace">&#8212;</td>
    <td><input type="number" id="xlq${i}" value="${vi2.max-vi2.qty}" style="width:55px"></td>
    <td><button class="dx" onclick="this.closest('tr').remove()">&#215;</button></td>`;
    if(tb) tb.appendChild(tr);
  });
  need.forEach((_,i)=>xAvail(i)); tst(`Loaded ${need.length} items to restock ${to}`,'info');
}

// ─── VANS ────────────────────────────────────────────────────────────────────
function bVans(){
  const vans=CU.role==='Van Tech'?[CU.loc]:VH;
  setTimeout(()=>rVan(vans[0]),30);
  return`<div class="pt">Van &amp; Vehicle Stock</div><div class="ps">Current inventory on each vehicle</div>
  <div class="tabs" id="vtabs">${vans.map((v,i)=>`<button class="tab${i===0?' active':''}" onclick="swVan('${v}',this)">${v}</button>`).join('')}</div>
  <div id="vcont"></div>`;
}
function swVan(van,btn){
  document.querySelectorAll('#vtabs .tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active'); rVan(van);
}
function rVan(van){
  const vi=(S.get('lhs:vi')||[]).filter(r=>r.vehicle===van);
  const el=g('vcont'); if(!el) return;
  if(!vi.length){el.innerHTML=`<div class="card" style="text-align:center;color:var(--muted);padding:24px">No inventory on ${van}. Use Transfer to load items.</div>`;return}
  el.innerHTML=`<div class="card" style="padding:0"><div class="tw"><table>
  <thead><tr><th>Item</th><th>SKU</th><th>Division</th><th>On Hand</th><th>Min</th><th>Max</th><th>Status</th></tr></thead>
  <tbody>${vi.map(r=>`<tr>
    <td style="font-weight:500">${r.item||r.sku}</td>
    <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)">${r.sku}</td>
    <td>${bx(r.division||'&#8212;','bn')}</td>
    <td class="${r.qty<r.min?'ql':r.qty===0?'qw':'qo'}" style="font-weight:700">${r.qty}</td>
    <td>${r.min}</td><td>${r.max}</td>
    <td>${r.qty===0?bx('OUT','br'):r.qty<r.min?bx('LOW','ba'):bx('OK','bg')}</td>
  </tr>`).join('')}</tbody></table></div></div>`;
}

// ─── LOCATIONS ───────────────────────────────────────────────────────────────
function bLocs(){
  const locs=S.get('lhs:locs')||[];
  return`<div class="pt">Locations &amp; Vehicles</div><div class="ps">Manage warehouses, service vans, and sales vehicles</div>
  <div class="sh"><div></div><button class="btn btn-n" onclick="oAddLoc()">+ Add Location / Vehicle</button></div>
  <div class="card" style="padding:0"><div class="tw"><table>
  <thead><tr><th>Name</th><th>Type</th><th>Region</th><th>Address</th><th>Active</th><th></th></tr></thead>
  <tbody>${locs.map((l,i)=>`<tr>
    <td style="font-weight:700;color:var(--navy)">${l.name}</td>
    <td>${bx(l.type,'bn')}</td><td>${l.region||'&#8212;'}</td>
    <td style="font-size:12px;color:var(--muted)">${l.addr||'&#8212;'}</td>
    <td>${l.active?bx('Active','bg'):bx('Inactive','bgr')}</td>
    <td><button class="btn sm btn-o" onclick="togLoc(${i})">${l.active?'Deactivate':'Activate'}</button></td>
  </tr>`).join('')}</tbody></table></div></div>`;
}
function oAddLoc(){
  oMod('Add Location or Vehicle',`<div class="fr">
    <div class="fl"><label>Name / Vehicle ID</label><input id="al0" placeholder="e.g. WI-R3 or Madison WI"></div>
    <div class="fl"><label>Type</label><select id="al1">
      <option>Warehouse</option><option>Service Van</option><option>Sales Vehicle</option>
    </select></div>
  </div><div class="fr">
    <div class="fl"><label>Region</label><input id="al2" placeholder="Wisconsin"></div>
    <div class="fl"><label>Address</label><input id="al3" placeholder="Street address"></div>
  </div>
  <div class="br2"><button class="btn btn-n" onclick="svLoc()">Add</button><button class="btn btn-o" onclick="cMod()">Cancel</button></div>`);
}
function svLoc(){
  const name=v('al0');const type=v('al1');const region=v('al2');const addr=v('al3');
  if(!name){tst('Name required','error');return}
  const locs=S.get('lhs:locs')||[];
  if(locs.find(l=>l.name.toLowerCase()===name.toLowerCase())){tst(`"${name}" already exists`,'error');return}
  locs.push({name,type,region,addr,active:true});
  S.set('lhs:locs',locs);
  if(type==='Warehouse'&&!WH.includes(name)) WH.push(name);
  if((type==='Service Van'||type==='Sales Vehicle')&&!VH.includes(name)) VH.push(name);
  // Close modal FIRST, then navigate — fix for "not appearing" bug
  document.getElementById('mo').classList.remove('open');
  tst(`${name} added as ${type}`,'success');
  showPage('locations');
}
function togLoc(i){
  const locs=S.get('lhs:locs')||[];locs[i].active=!locs[i].active;S.set('lhs:locs',locs);
  WH=locs.filter(l=>l.active&&l.type==='Warehouse').map(l=>l.name);
  VH=locs.filter(l=>l.active&&(l.type==='Service Van'||l.type==='Sales Vehicle')).map(l=>l.name);
  showPage('locations');
}


// ─── LOCATION STOCK ──────────────────────────────────────────────────────────
function bLS(){
  const ls=S.get('lhs:ls')||[];const it=S.get('lhs:items')||[];
  // Group by location
  const byLoc={};
  ls.forEach(r=>{if(!byLoc[r.location]) byLoc[r.location]=[];byLoc[r.location].push(r);});
  const locs=Object.keys(byLoc).sort();
  const low=ls.filter(r=>r.qty<r.min).length;
  return`<div class="pt">Location Stock</div>
  <div class="ps">Warehouse inventory by location &mdash; ${ls.length} entries &middot; ${low>0?`<span style="color:var(--red)">${low} below minimum</span>`:'<span style="color:var(--green)">all above minimum</span>'}</div>
  <div class="sh"><div></div><button class="btn btn-n" onclick="oAddLS()">+ Add Stock Entry</button></div>
  ${locs.length===0?'<div class="card" style="text-align:center;color:var(--muted);padding:32px">No location stock entries yet. Receive items via Purchase Orders to populate this.</div>'
  :locs.map(loc=>{
    const rows=byLoc[loc];
    const locLow=rows.filter(r=>r.qty<r.min).length;
    return`<div class="card" style="padding:0;margin-bottom:20px">
      <div style="padding:14px 20px;background:var(--navy);border-radius:var(--rl) var(--rl) 0 0;display:flex;align-items:center;justify-content:space-between">
        <div style="color:var(--gold);font-weight:700;font-size:15px">&#127968; ${loc}</div>
        <div style="display:flex;gap:8px;align-items:center">
          ${locLow>0?`<span class="bx br">${locLow} below min</span>`:''}
          <span style="color:rgba(255,255,255,.6);font-size:12px">${rows.length} SKU${rows.length!==1?'s':''}</span>
        </div>
      </div>
      <div class="tw"><table>
        <thead><tr><th>Item Name</th><th>SKU</th><th>Bin/Shelf</th><th>On Hand</th><th>Min</th><th>Max</th><th>Status</th><th>Last Updated</th><th></th></tr></thead>
        <tbody>${rows.map((r,ri)=>{
          const idx=ls.indexOf(r);
          const status=r.qty===0?'<span class="bx br">OUT</span>':r.qty<r.min?'<span class="bx ba">LOW</span>':'<span class="bx bg">OK</span>';
          return`<tr>
            <td style="font-weight:500">${r.item||r.sku}</td>
            <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)">${r.sku}</td>
            <td style="color:var(--muted)">${r.bin||'&#8212;'}</td>
            <td class="${r.qty<r.min?'ql':r.qty===0?'qw':'qo'}" style="font-weight:700;font-size:15px">${r.qty}</td>
            <td>${r.min}</td><td>${r.max}</td>
            <td>${status}</td>
            <td style="font-size:12px;color:var(--muted)">${r.updated||'&#8212;'}</td>
            <td><button class="btn sm btn-o" onclick="oEditLS(${idx})">Edit</button></td>
          </tr>`;}).join('')}
        </tbody>
      </table></div>
    </div>`;
  }).join('')}`;
}

function oAddLS(){
  const it=S.get('lhs:items')||[];
  oMod('Add Location Stock Entry',`
  <div class="fr">
    <div class="fl"><label>Item</label><select id="lsa0">
      <option value="">&#8212; Select &#8212;</option>
      ${it.map(i=>`<option value="${i.sku}">${i.name} (${i.sku})</option>`).join('')}
    </select></div>
    <div class="fl"><label>Location</label><select id="lsa1">
      ${WH.map(w=>`<option>${w}</option>`).join('')}
    </select></div>
  </div>
  <div class="fr">
    <div class="fl"><label>Qty On Hand</label><input type="number" id="lsa2" value="0" min="0"></div>
    <div class="fl"><label>Min QTY</label><input type="number" id="lsa3" value="0" min="0"></div>
    <div class="fl"><label>Max QTY</label><input type="number" id="lsa4" value="0" min="0"></div>
  </div>
  <div class="fl" style="margin-bottom:16px"><label>Bin / Shelf</label><input id="lsa5" placeholder="e.g. A-12"></div>
  <div class="br2"><button class="btn btn-n" onclick="svAddLS()">Add Entry</button><button class="btn btn-o" onclick="cMod()">Cancel</button></div>`);
}
function svAddLS(){
  const sku=v('lsa0');const it=(S.get('lhs:items')||[]).find(i=>i.sku===sku);
  if(!sku){tst('Select an item','error');return}
  const ls=S.get('lhs:ls')||[];
  const loc=v('lsa1');
  if(ls.find(r=>r.sku===sku&&r.location===loc)){tst('Entry already exists for this item at this location. Use Edit to update.','error');return}
  ls.push({sku,item:it?.name||sku,location:loc,qty:pi('lsa2'),min:pi('lsa3'),max:pi('lsa4'),bin:v('lsa5'),updated:td()});
  S.set('lhs:ls',ls);cMod();tst('Stock entry added','success');showPage('locstock');
}
function oEditLS(idx){
  const ls=S.get('lhs:ls')||[];const r=ls[idx];
  oMod(`Edit: ${r.item||r.sku} @ ${r.location}`,`
  <div class="fr">
    <div class="fl"><label>Qty On Hand</label><input type="number" id="lse0" value="${r.qty}" min="0"></div>
    <div class="fl"><label>Min QTY</label><input type="number" id="lse1" value="${r.min}" min="0"></div>
    <div class="fl"><label>Max QTY</label><input type="number" id="lse2" value="${r.max}" min="0"></div>
  </div>
  <div class="fl" style="margin-bottom:16px"><label>Bin / Shelf</label><input id="lse3" value="${r.bin||''}"></div>
  <div class="br2">
    <button class="btn btn-n" onclick="svEditLS(${idx})">Save</button>
    <button class="btn btn-r sm" onclick="delLS(${idx})">Remove</button>
    <button class="btn btn-o" onclick="cMod()">Cancel</button>

async function sAI(){
  const q=v('aiq'); if(!q) return; g('aiq').value='';
  const m=g('aim'); if(!m) return;
  m.innerHTML+=`<div style="background:var(--navy);color:var(--white);border-radius:8px;padding:8px 12px;margin:8px 0;font-size:13px;max-width:80%;margin-left:auto"><b>You:</b> ${q}</div>`;
  m.innerHTML+=`<div id="aith" style="color:var(--muted);font-size:13px;padding:4px">Thinking&#8230;</div>`;
  m.scrollTop=m.scrollHeight;
  try{
    const c=window._ac||{};
    const sys=`You are an inventory assistant for Lifetime Home Services (LHS), a multi-division home services company with 11 divisions.
Items: ${JSON.stringify(c.it?.map(i=>({sku:i.sku,name:i.name,division:i.division,cost:i.cost})))}
Warehouse stock: ${JSON.stringify(c.ls)}
Van inventory: ${JSON.stringify(c.vi)}
Low stock: ${JSON.stringify(c.low?.map(r=>({sku:r.sku,where:r.location||r.vehicle,qty:r.qty,min:r.min})))}
Open POs: ${JSON.stringify(c.pos?.map(p=>({id:p.id,vendor:p.vendor,status:p.status})))}
Be concise and give actionable recommendations specific to LHS.`;
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:sys,messages:[{role:'user',content:q}]})});
    const d=await r.json();const ans=d.content?.[0]?.text||'No response.';
    g('aith')?.remove();
    m.innerHTML+=`<div style="background:#f0f4ff;border:1px solid #c7d7ff;border-radius:8px;padding:10px 12px;margin:8px 0;font-size:13px;line-height:1.6"><b style="color:var(--navy)">AI:</b> ${ans.replace(/\n/g,'<br>')}</div>`;
    m.scrollTop=m.scrollHeight;
  }catch{const el=g('aith');if(el) el.textContent='Error &#8212; check connection.';}
}

}

    <td>${bx(typeof ven==='string'?'Net 30':ven.terms||'Net 30','bgr')}</td>
    <td style="color:var(--muted);font-size:12px">${typeof ven==='string'?'':ven.category||'&#8212;'}</td>
    <td style="white-space:nowrap">
      <button class="btn sm btn-o" onclick="oEditVen(${i})">Edit</button>
      <button class="btn sm btn-r" onclick="delVen(${i})">&#215;</button>
    </td>
  </tr>`).join('')}
  </tbody></table></div></div>`;
}
function oAddVen(){
  oMod('Add Vendor',`<div class="fr">
    <div class="fl"><label>Vendor Name</label><input id="av0" placeholder="Vendor Inc."></div>
    <div class="fl"><label>Phone</label><input id="av1" placeholder="1-800-000-0000"></div>
  </div><div class="fr">
    <div class="fl"><label>Email</label><input id="av2" placeholder="orders@vendor.com"></div>
    <div class="fl"><label>Payment Terms</label><select id="av3">
      <option>Net 30</option><option>Net 45</option><option>Net 60</option><option>COD</option><option>Prepay</option>
    </select></div>
  </div>
  <div class="fl" style="margin-bottom:16px"><label>Category</label><input id="av4" placeholder="e.g. Electrical, HVAC, General Hardware"></div>
  <div class="br2"><button class="btn btn-n" onclick="svAddVen()">Add Vendor</button><button class="btn btn-o" onclick="cMod()">Cancel</button></div>`);
}
function svAddVen(){
  const name=v('av0');if(!name){tst('Vendor name required','error');return}
  const vens=S.get('lhs:vens')||VENS.map(x=>({name:x,phone:'',email:'',terms:'Net 30',category:''}));
  if(vens.find(x=>(x.name||x).toLowerCase()===name.toLowerCase())){tst('Vendor already exists','error');return}
  vens.push({name,phone:v('av1'),email:v('av2'),terms:v('av3'),category:v('av4')});
  S.set('lhs:vens',vens);if(!VENS.includes(name)) VENS.push(name);
  cMod();tst(`${name} added`,'success');g('atab').innerHTML=aVens();
}
function oEditVen(i){
  const vens=S.get('lhs:vens')||VENS.map(x=>({name:x,phone:'',email:'',terms:'Net 30',category:''}));
  const ven=vens[i];const name=typeof ven==='string'?ven:ven.name;
  const phone=typeof ven==='string'?'':ven.phone||'';
  const email=typeof ven==='string'?'':ven.email||'';
  const terms=typeof ven==='string'?'Net 30':ven.terms||'Net 30';
  const cat=typeof ven==='string'?'':ven.category||'';
  oMod('Edit: '+name,`<div class="fr">
    <div class="fl"><label>Vendor Name</label><input id="ev0" value="${name}"></div>
    <div class="fl"><label>Phone</label><input id="ev1" value="${phone}"></div>
  </div><div class="fr">
    <div class="fl"><label>Email</label><input id="ev2" value="${email}"></div>
    <div class="fl"><label>Terms</label><select id="ev3">
      ${['Net 30','Net 45','Net 60','COD','Prepay'].map(t=>`<option${terms===t?' selected':''}>${t}</option>`).join('')}
    </select></div>
  </div>
  <div class="fl" style="margin-bottom:16px"><label>Category</label><input id="ev4" value="${cat}"></div>
  <div class="br2"><button class="btn btn-n" onclick="svEditVen(${i})">Save</button>
  <button class="btn btn-r sm" onclick="delVen(${i})">Delete</button>
  <button class="btn btn-o" onclick="cMod()">Cancel</button></div>`);
}
function svEditVen(i){
  const vens=S.get('lhs:vens')||VENS.map(x=>({name:x,phone:'',email:'',terms:'Net 30',category:''}));
  const old=typeof vens[i]==='string'?vens[i]:vens[i].name;
  vens[i]={name:v('ev0'),phone:v('ev1'),email:v('ev2'),terms:v('ev3'),category:v('ev4')};
  S.set('lhs:vens',vens);
  const vi=VENS.indexOf(old);if(vi>=0) VENS[vi]=vens[i].name;
  cMod();tst('Vendor updated','success');g('atab').innerHTML=aVens();
}
function delVen(i){
  const vens=S.get('lhs:vens')||VENS.map(x=>({name:x,phone:'',email:'',terms:'Net 30',category:''}));
  const name=typeof vens[i]==='string'?vens[i]:vens[i].name;
  if(!confirm(`Delete vendor "${name}"?`))return;
  vens.splice(i,1);S.set('lhs:vens',vens);
  const vi=VENS.indexOf(name);if(vi>=0) VENS.splice(vi,1);
  tst('Vendor deleted','info');g('atab').innerHTML=aVens();
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function oMod(title,body){document.getElementById('mt').innerHTML=title;document.getElementById('mb').innerHTML=body;document.getElementById('mo').classList.add('open');}
function cMod(){document.getElementById('mo').classList.remove('open');}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let _t;
function tst(msg,type='info'){const t=g('tst');t.textContent=msg;t.className='show '+type;clearTimeout(_t);_t=setTimeout(()=>t.classList.remove('show'),4000);}

// ─── INPUT HELPERS ───
const g=id=>document.getElementById(id);
const v=id=>{const el=g(id);return el?el.value.trim():''};
const pf=id=>{const el=g(id);return el?parseFloat(el.value)||0:0};
const pi=id=>{const el=g(id);return el?parseInt(el.value)||0:0};
const pi2=id=>{const el=g(id);return el?parseInt(el.value)||0:0};
</script>
