}

function oAddCustomer(){ oMod('Add Customer',custForm({},'svAddCustomer')); }

async function svAddCustomer(){
  const fn=v('cf-fn'),ln=v('cf-ln');
  if(!fn||!ln){tst('First and last name required','error');return}
  const state=v('cf-st');
  const region=Object.keys(REGIONS).find(r=>REGIONS[r].states.includes(state))||'';
  const c={first_name:fn,last_name:ln,company:v('cf-co')||null,
    phone:v('cf-ph')||null,email:v('cf-em')||null,
    address:v('cf-ad')||null,city:v('cf-ct')||null,
    state:state||null,zip:v('cf-zip')||null,
    region:region||null,division:v('cf-div')||null,
    notes:v('cf-notes')||null,source:'Manual'};
  const saved=await dbInsert('lhs:customers',c);
  if(!saved){tst('Failed to save customer','error');return}
  const custs=S.get('lhs:customers')||[];custs.unshift(saved);S.set('lhs:customers',custs);
  cMod();tst(`${fn} ${ln} added`,'success');showPage('customers');
}

function oEditCustomer(id){
  const c=(S.get('lhs:customers')||[]).find(x=>x.id===id);
  if(!c) return;
  window._editCustId=id;
  oMod(`Edit: ${c.first_name} ${c.last_name}`,custForm(c,'svEditCustomer'));
}

async function svEditCustomer(){
  const id=window._editCustId;if(!id) return;
  const fn=v('cf-fn'),ln=v('cf-ln');
  if(!fn||!ln){tst('First and last name required','error');return}
  const state=v('cf-st');
  const region=Object.keys(REGIONS).find(r=>REGIONS[r].states.includes(state))||'';
  const updates={first_name:fn,last_name:ln,company:v('cf-co')||null,
    phone:v('cf-ph')||null,email:v('cf-em')||null,
    address:v('cf-ad')||null,city:v('cf-ct')||null,
    state:state||null,zip:v('cf-zip')||null,
    region:region||null,division:v('cf-div')||null,notes:v('cf-notes')||null};
  await dbUpdate('lhs:customers',id,updates);
  const custs=S.get('lhs:customers')||[];
  const idx=custs.findIndex(c=>c.id===id);
  if(idx>=0) custs[idx]={...custs[idx],...updates};
  S.set('lhs:customers',custs);
  cMod();tst('Customer updated','success');showPage('customers');
}

function openCustomer(id){
  const c=(S.get('lhs:customers')||[]).find(x=>x.id===id);
  if(!c){tst('Customer not found','error');return}
  const wos=(S.get('lhs:work_orders')||[]).filter(w=>w.customer_id===id);
  const totalSpent=wos.reduce((s,w)=>s+(w.total_paid||0),0);
  const region=c.region||Object.keys(REGIONS).find(r=>REGIONS[r].states.includes(c.state))||'';
  document.getElementById('mt').innerHTML=`${c.first_name} ${c.last_name}${c.company?` <span style="font-size:13px;font-weight:400;color:var(--muted)">(${c.company})</span>`:''}`;
  document.getElementById('mb').innerHTML=`
  <div class="two-col" style="margin-bottom:16px">
    <div class="card" style="padding:16px">
      <div class="ct">Contact Info</div>
      <div style="display:grid;grid-template-columns:auto 1fr;gap:6px 12px;font-size:13px">
        ${c.phone?`<span style="color:var(--muted)">Phone</span><span>${c.phone}</span>`:''}
        ${c.email?`<span style="color:var(--muted)">Email</span><span>${c.email}</span>`:''}
        ${c.address?`<span style="color:var(--muted)">Address</span><span>${c.address}, ${c.city||''} ${c.state||''} ${c.zip||''}</span>`:''}
        ${region?`<span style="color:var(--muted)">Region</span><span style="color:${REGIONS[region]?.color||'inherit'};font-weight:600">${region}</span>`:''}
        ${c.division?`<span style="color:var(--muted)">Division</span><span>${c.division}</span>`:''}
        ${c.notes?`<span style="color:var(--muted)">Notes</span><span>${c.notes}</span>`:''}
      </div>
      <div class="brow" style="margin-top:12px">
        <button class="btn btn-o sm" onclick="oEditCustomer('${id}')">Edit</button>
        <button class="btn btn-n sm" onclick="cMod();oCreateWO()">+ New WO</button>
      </div>
    </div>
    <div class="card" style="padding:16px">
      <div class="ct">Account Summary</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div style="text-align:center;background:var(--surf);border-radius:8px;padding:12px">
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:600">Work Orders</div>
          <div style="font-size:24px;font-weight:700;font-family:'DM Mono',monospace;color:var(--navy)">${wos.length}</div>
        </div>
        <div style="text-align:center;background:var(--surf);border-radius:8px;padding:12px">
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:600">Total Paid</div>
          <div style="font-size:24px;font-weight:700;font-family:'DM Mono',monospace;color:var(--green)">$${totalSpent.toFixed(0)}</div>
        </div>
      </div>
    </div>
  </div>
  <div style="font-size:14px;font-weight:600;color:var(--navy);margin-bottom:10px">Work Order History (${wos.length})</div>
  ${wos.length?`<div class="tw"><table>
    <thead><tr><th>WO #</th><th>Division</th><th>Job Type</th><th>Status</th><th>Total</th><th>Balance</th><th></th></tr></thead>
    <tbody>${wos.map(w=>`<tr>
      <td style="font-family:'DM Mono',monospace;font-weight:700;color:var(--navy)">${w.wo_number}</td>
      <td>${bx(w.division,'bn')}</td>
      <td style="font-size:12px">${w.job_type||'—'}</td>
      <td>${bx(w.status||'Scheduled',w.status==='Completed'?'bg':'ba')}</td>
      <td style="font-family:'DM Mono',monospace">$${(w.total_price||0).toFixed(2)}</td>
      <td style="font-family:'DM Mono',monospace;color:${((w.total_price||0)-(w.total_paid||0))>0?'var(--red)':'var(--green)'}">$${((w.total_price||0)-(w.total_paid||0)).toFixed(2)}</td>
      <td><button class="btn sm btn-n" onclick="cMod();openWO('${w.id}')">Open</button></td>
    </tr>`).join('')}</tbody>
  </table></div>`:'<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px;border:1px dashed var(--bdr);border-radius:8px">No work orders yet</div>'}
  <div class="brow" style="margin-top:16px">
    <button class="btn btn-o" onclick="cMod()">Close</button>
  </div>`;
  document.getElementById('mo').classList.add('open');
}

// ── GLOBAL SEARCH ────────────────────────────────────────────────────────────
function globalSearch(q){
  const res=document.getElementById('gsresults');
  if(!q||q.length<2){res.style.display='none';return}
  const ql=q.toLowerCase();
  const results=[];
  (S.get('lhs:work_orders')||[]).filter(w=>
    w.wo_number?.toLowerCase().includes(ql)||
    w.customer_name?.toLowerCase().includes(ql)||
    w.division?.toLowerCase().includes(ql)
  ).slice(0,4).forEach(w=>results.push({
    type:'WO',icon:'&#128203;',color:'var(--navy)',
    title:w.wo_number,sub:`${w.customer_name} — ${w.division}`,
    action:`openWO('${w.id}')`
  }));
  (S.get('lhs:customers')||[]).filter(c=>
    `${c.first_name||''} ${c.last_name||''}`.toLowerCase().includes(ql)||
    (c.phone||'').replace(/\D/g,'').includes(q.replace(/\D/g,''))||
    (c.email||'').toLowerCase().includes(ql)
  ).slice(0,4).forEach(c=>results.push({
    type:'Customer',icon:'&#128100;',color:'var(--green)',
    title:`${c.first_name} ${c.last_name}${c.company?' ('+c.company+')':''}`,
    sub:`${c.phone||''} ${c.city||''} ${c.state||''}`.trim(),
    action:`openCustomer('${c.id}')`
  }));
  if(!results.length){res.style.display='block';
    res.innerHTML='<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">No results found</div>';return;}
  res.style.display='block';
  res.innerHTML=results.map(r=>`
    <div onclick="${r.action};document.getElementById('gsresults').style.display='none';document.getElementById('gsearch').value=''"
      style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px"
      onmouseover="this.style.background='var(--surf)'" onmouseout="this.style.background=''">
      <span style="font-size:16px">${r.icon}</span>
      <div>
        <div style="font-size:13px;font-weight:500;color:var(--text)">${r.title}</div>
        <div style="font-size:11px;color:var(--muted)">${bx(r.type,r.type==='WO'?'bn':'bg')} ${r.sub}</div>
      </div>
    </div>`).join('');
}


// ─── MODAL ───────────────────────────────────────────────────────────────────
function oMod(title,body){
  document.getElementById('mt').innerHTML=title;
  document.getElementById('mb').innerHTML=body;
  document.getElementById('mo').classList.add('open');
}
function cMod(){
  document.getElementById('mo').classList.remove('open');
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function tst(msg,type='info'){
  const el=document.getElementById('tst');
  if(!el) return;
  el.textContent=msg;
  el.className='tst show '+(type==='error'?'terr':type==='success'?'tok':type==='warning'?'twrn':'');
  clearTimeout(window._tstTO);
  window._tstTO=setTimeout(()=>el.classList.remove('show'),3500);
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
const g=id=>document.getElementById(id);
const pf=id=>parseFloat(document.getElementById(id)?.value)||0;
const pi=id=>parseInt(document.getElementById(id)?.value)||0;
function td(d=new Date()){return d.toISOString().split('T')[0]}
function f$(n){return'$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function bx(label,cls='bn'){return`<span class="bx ${cls}">${label}</span>`}
