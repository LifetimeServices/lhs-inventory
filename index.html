function globalSearch(q){
  const res=document.getElementById('gsresults');
  if(!q||q.length<2){res.style.display='none';return}
  const ql=q.toLowerCase();
  const results=[];
  (S.get('lhs:work_orders')||[]).filter(w=>
    w.wo_number?.toLowerCase().includes(ql)||
    w.customer_name?.toLowerCase().includes(ql)||
    w.division?.toLowerCase().includes(ql)
  ).slice(0,4).forEach(w=>results.push({
    type:'WO',icon:'&#128203;',color:'var(--navy)',
    title:w.wo_number,sub:`${w.customer_name} — ${w.division}`,
    action:`openWO('${w.id}')`
  }));
  (S.get('lhs:customers')||[]).filter(c=>
    `${c.first_name||''} ${c.last_name||''}`.toLowerCase().includes(ql)||
    (c.phone||'').replace(/\D/g,'').includes(q.replace(/\D/g,''))||
    (c.email||'').toLowerCase().includes(ql)
  ).slice(0,4).forEach(c=>results.push({
    type:'Customer',icon:'&#128100;',color:'var(--green)',
    title:`${c.first_name} ${c.last_name}${c.company?' ('+c.company+')':''}`,
    sub:`${c.phone||''} ${c.city||''} ${c.state||''}`.trim(),
    action:`openCustomer('${c.id}')`
  }));
  if(!results.length){res.style.display='block';
    res.innerHTML='<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">No results found</div>';return;}
  res.style.display='block';
  res.innerHTML=results.map(r=>`
    <div onclick="${r.action};document.getElementById('gsresults').style.display='none';document.getElementById('gsearch').value=''"
      style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px"
      onmouseover="this.style.background='var(--surf)'" onmouseout="this.style.background=''">
      <span style="font-size:16px">${r.icon}</span>
      <div>
        <div style="font-size:13px;font-weight:500;color:var(--text)">${r.title}</div>
        <div style="font-size:11px;color:var(--muted)">${bx(r.type,r.type==='WO'?'bn':'bg')} ${r.sub}</div>
      </div>
    </div>`).join('');
}

// ── CLOSEOUT BOARD ────────────────────────────────────────────────────────────
function bCloseout(){
  const wos=S.get('lhs:work_orders')||[];
  const apts=S.get('lhs:appointments')||[];
  const techs=S.get('lhs:apt_techs')||[];
  const canReview=['God View','Admin','Director','Regional Manager','Operations Manager'].includes(CU?.role);

  // Show WOs where at least one appointment is Completed AND WO is not yet Closed
  const pending=wos.filter(w=>{
    if(['Closed with Dispatch','Cancelled'].includes(w.status)) return false;
    // Show if any apt is completed OR if WO pct_complete >= 50
    const woApts=apts.filter(a=>a.wo_id===w.id);
    const hasCompletedApt=woApts.some(a=>a.status==='Completed'||a.pct_complete>=100);
    const woPct=woApts.length?Math.round(woApts.reduce((s,a)=>s+(a.pct_complete||0),0)/woApts.length):0;
    return hasCompletedApt||woPct>=50;
  });
  // Filter state
  const _div=window._coDiv||'';
  const _reg=window._coReg||'';
  const _state=window._coState||'';
  const _tech=window._coTech||'';
  const _aptFilter=window._coAptFilter||'all';

  let filtered=pending;
  if(_div) filtered=filtered.filter(w=>w.division===_div);
  if(_reg) filtered=filtered.filter(w=>{
    const s=(w.customer_state||'').toUpperCase().slice(0,2);
    return REGIONS[_reg]?.states.includes(s);
  });
  if(_state) filtered=filtered.filter(w=>(w.customer_state||'').toUpperCase().slice(0,2)===_state.toUpperCase());

  if(_aptFilter==='has') filtered=filtered.filter(w=>apts.some(a=>a.wo_id===w.id&&a.status==='Scheduled'));

      <select onchange="window._coTech=this.value;showPage('closeout')">
        <option value="">All Techs</option>
        ${allTechNames.map(t=>`<option${t===_tech?' selected':''}>${t}</option>`).join('')}
      </select>
    </div>
    <div class="fl" style="margin:0;min-width:170px"><label>Appointments</label>
      <select onchange="window._coAptFilter=this.value;showPage('closeout')">

        <option value="none"${_aptFilter==='none'?' selected':''}>No More Scheduled</option>
        <option value="has"${_aptFilter==='has'?' selected':''}>More Scheduled</option>
      </select>
    </div>
    <button class="btn btn-o sm" onclick="window._coDiv='';window._coReg='';window._coState='';window._coTech='';window._coAptFilter='all';showPage('closeout')">Clear</button>
  </div>

  ${!filtered.length?`<div class="card" style="text-align:center;padding:48px;color:var(--muted)">
    <div style="font-size:32px;margin-bottom:12px">&#10003;</div>
    <div style="font-weight:600;font-size:16px">${pending.length?'No results match your filters':'All caught up!'}</div>
  </div>`:`<div class="card" style="padding:0"><div class="tw"><table>

  <tbody>${filtered.map(wo=>{

    const balance=(wo.total_price||0)-(wo.total_paid||0);
    const auditScore=wo.creation_audit_score;
    const pct=calcWOCompletion(wo.id);

async function closeoutWO(woId){
  if(!confirm('Mark this work order as Closed with Dispatch?')) return;
  const wos=S.get('lhs:work_orders')||[];
  const wo=wos.find(w=>w.id===woId);
  if(wo){wo.status='Closed with Dispatch';wo.closed_at=new Date().toISOString();wo.closed_by=CU.name;S.set('lhs:work_orders',wos);}
  await dbUpdate('lhs:work_orders',woId,{status:'Closed with Dispatch',closed_at:new Date().toISOString(),closed_by:CU.name});
  tst('Work order closed','success');showPage('closeout');
}

async function svAddTool(){

function bReports(){
  const wos=S.get('lhs:work_orders')||[];
  const apts=S.get('lhs:appointments')||[];
  const payments=S.get('lhs:payments')||[];
  const totalRev=payments.reduce((s,p)=>s+(p.amount||0),0);
  const openWOs=wos.filter(w=>!['Completed','Closed with Dispatch','Cancelled'].includes(w.status)).length;
  const completedWOs=wos.filter(w=>w.status==='Completed'||w.status==='Closed with Dispatch').length;
  const byDiv={};
  wos.forEach(w=>{if(!byDiv[w.division])byDiv[w.division]={count:0,rev:0};byDiv[w.division].count++;});
  payments.forEach(p=>{const wo=wos.find(w=>w.id===p.wo_id);if(wo){if(!byDiv[wo.division])byDiv[wo.division]={count:0,rev:0};byDiv[wo.division].rev+=(p.amount||0);}});
  return`<div class="pt">Reports</div>
  <div class="ps">Work order and revenue summaries across all divisions</div>
  <div class="sg">
    <div class="sc g"><div class="sl">Total Revenue</div><div class="sv">$${Math.round(totalRev).toLocaleString()}</div><div class="ss">All payments posted</div></div>
    <div class="sc n"><div class="sl">Total Work Orders</div><div class="sv">${wos.length}</div><div class="ss">${openWOs} open · ${completedWOs} closed</div></div>
    <div class="sc a"><div class="sl">Appointments</div><div class="sv">${apts.length}</div><div class="ss">All time</div></div>
    <div class="sc r"><div class="sl">Avg WO Value</div><div class="sv">$${wos.length?Math.round(wos.reduce((s,w)=>s+(w.total_price||0),0)/wos.length).toLocaleString():0}</div><div class="ss">Per work order</div></div>
  </div>
  <div class="card"><div class="ct">Revenue by Division</div>
  <div class="tw"><table><thead><tr><th>Division</th><th>Work Orders</th><th>Revenue</th><th>Avg per WO</th></tr></thead>
  <tbody>${Object.entries(byDiv).sort((a,b)=>b[1].rev-a[1].rev).map(([div,data])=>`<tr>
    <td>${bx(div)}</td>
    <td style="font-weight:600">${data.count}</td>
    <td style="font-family:'DM Mono',monospace;font-weight:600;color:var(--green)">$${Math.round(data.rev).toLocaleString()}</td>
    <td style="font-family:'DM Mono',monospace;color:var(--muted)">$${data.count?Math.round(data.rev/data.count).toLocaleString():0}</td>
  </tr>`).join('')}
  </tbody></table></div></div>
  <div style="margin-top:16px;text-align:center">
    <button class="btn btn-n" onclick="expAll()">Export All Data (JSON)</button>
    <button class="btn btn-o" style="margin-left:8px" onclick="tst('Custom report builder coming soon','info')">Custom Reports</button>
  </div>`;
}

function crmTab(tab,btn){

  </tr>`).join('')}</tbody></table></div></div>`}`;
}

function filterLeads(status,btn){
  document.querySelectorAll('#crm-tab-content .btn.btn-o.sm').forEach(b=>b.style.background='');

async function svAddActivity(leadId,oppId){
  const act={
    lead_id:leadId||null,opportunity_id:oppId||null,
    activity_type:v('act-type'),subject:v('act-sub')||null,
    outcome:v('act-out')||null,notes:v('act-notes')||null,
    next_action:v('act-na')||null,
    next_action_date:v('act-nad')||null,
    performed_by:CU.name,
    performed_at:document.getElementById('act-dt')?.value?new Date(v('act-dt')).toISOString():new Date().toISOString(),
    created_at:new Date().toISOString(),
  };
  const saved=await dbInsert('lhs:activities',act);
  const acts=S.get('lhs:activities')||[];
  acts.unshift(saved||{...act,id:'act_'+Date.now()});
  S.set('lhs:activities',acts);
  // Update lead last contact
  if(leadId){
    const leads=S.get('lhs:leads')||[];
    const l=leads.find(x=>x.id===leadId);
    if(l){l.last_contact_at=act.performed_at;
      if(act.next_action_date) l.next_followup_at=act.next_action_date;
      S.set('lhs:leads',leads);
      await dbUpdate('lhs:leads',leadId,{last_contact_at:act.performed_at,next_followup_at:l.next_followup_at,status:l.status==='New'?'Contacted':l.status});
    }
  }
  cMod();tst('Activity logged','success');
  if(leadId) openLead(leadId);
  else if(oppId) openOpportunity(oppId);
}

  };

  const opps=S.get('lhs:opportunities')||[];

async function updateOppStage(id,stage){
  const opps=S.get('lhs:opportunities')||[];
  const o=opps.find(x=>x.id===id);
  if(o){o.stage=stage;o.updated_at=new Date().toISOString();S.set('lhs:opportunities',opps);}
  const prob=stage==='Won'?100:stage==='Lost'?0:stage==='Negotiation'?75:stage==='Proposal Sent'?50:20;
  await dbUpdate('lhs:opportunities',id,{stage,probability:prob,updated_at:new Date().toISOString()});
  tst(`Stage: ${stage}`,'success');openOpportunity(id);
}

function oppToWO(oppId){

  window._woDiv=o.division||DIVS[0];
  window._woType=o.job_type||'Installation';
  window._woOppId=oppId;
  oCreateWO();
  tst('WO pre-filled from opportunity — review and save','info');
}

// ── NOTIFICATION SYSTEM ───────────────────────────────────────────────────────
async function sendNotification(notif){
  const all=S.get('lhs:notifications')||[];
  const entry={...notif,id:'notif_'+Date.now()+'_'+Math.random().toString(36).slice(2),is_read:false,created_at:new Date().toISOString()};
  all.push(entry);S.set('lhs:notifications',all);
  // Save to Supabase
  try{await DB.from('lhs_notifications').insert({
    user_email:notif.user_email,user_name:notif.user_name,
    type:notif.type||'note',title:notif.title,body:notif.body,
    entity_type:notif.entity_type,entity_id:notif.entity_id,
    entity_label:notif.entity_label,from_user:notif.from_user,
  });}catch(e){console.warn('Notif save:',e.message);}
  refreshNotifBadge();
}

function refreshNotifBadge(){
  const all=S.get('lhs:notifications')||[];
  const mine=all.filter(n=>n.user_email===CU?.email&&!n.is_read);
  const badge=document.getElementById('notif-badge');
  if(!badge) return;
  if(mine.length>0){
    badge.textContent=mine.length>99?'99+':mine.length;
    badge.style.display='flex';
  } else {
    badge.style.display='none';
  }
}

function toggleNotifPanel(){
  const panel=document.getElementById('notif-panel');
  if(!panel) return;
  const isOpen=panel.style.display!=='none';
  panel.style.display=isOpen?'none':'block';
  if(!isOpen) renderNotifList();
  // Close on outside click
  if(!isOpen){
    setTimeout(()=>{
      document.addEventListener('click',function closePanel(e){
        if(!panel.contains(e.target)&&!e.target.closest('[onclick="toggleNotifPanel()"]')){
          panel.style.display='none';
          document.removeEventListener('click',closePanel);
        }
      });
    },100);
  }
}

function renderNotifList(){
  const all=S.get('lhs:notifications')||[];
  const mine=all.filter(n=>n.user_email===CU?.email).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  const list=document.getElementById('notif-list');
  if(!list) return;
  if(!mine.length){list.innerHTML='<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">No notifications</div>';return;}
  list.innerHTML=mine.slice(0,30).map(n=>`
  <div onclick="notifClick('${n.id}')"
    style="padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--bdr);
    background:${n.is_read?'transparent':'rgba(26,43,73,.04)'};
    display:flex;gap:10px;align-items:flex-start"
    onmouseover="this.style.background='var(--surf)'" onmouseout="this.style.background='${n.is_read?'transparent':'rgba(26,43,73,.04)'}'">
    <div style="font-size:18px;flex-shrink:0">${n.type==='note'?'&#128221;':n.type==='task'?'&#9989;':'&#128276;'}</div>
    <div style="flex:1;min-width:0">
      <div style="font-weight:${n.is_read?'400':'600'};font-size:13px;color:var(--text)">${n.title}</div>
      ${n.body?`<div style="font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${n.body}</div>`:''}
      <div style="font-size:11px;color:var(--muted);margin-top:2px">From ${n.from_user||'System'} · ${new Date(n.created_at).toLocaleString()}</div>
    </div>
    ${!n.is_read?'<div style="width:8px;height:8px;background:var(--navy);border-radius:50%;flex-shrink:0;margin-top:4px"></div>':''}
  </div>`).join('');
}

async function notifClick(id){
  const all=S.get('lhs:notifications')||[];
  const n=all.find(x=>x.id===id);
  if(!n) return;
  n.is_read=true;S.set('lhs:notifications',all);
  try{await DB.from('lhs_notifications').update({is_read:true}).eq('id',id);}catch{}
  refreshNotifBadge();
  document.getElementById('notif-panel').style.display='none';
  // Navigate to entity
  if(n.entity_type==='work_order'&&n.entity_id){
    showPage('workorders');
    setTimeout(()=>openWO(n.entity_id),300);
  } else if(n.entity_type==='lead'&&n.entity_id){
    showPage('crm');
    setTimeout(()=>openLead(n.entity_id),300);
  }
}

async function markAllNotifsRead(){
  const all=S.get('lhs:notifications')||[];
  all.filter(n=>n.user_email===CU?.email&&!n.is_read).forEach(n=>n.is_read=true);
  S.set('lhs:notifications',all);
  try{await DB.from('lhs_notifications').update({is_read:true}).eq('user_email',CU.email).eq('is_read',false);}catch{}
  refreshNotifBadge();renderNotifList();
}

// Poll for new notifications every 60 seconds
let _notifPollInterval=null;
function startNotifPolling(){
  if(_notifPollInterval) return;
  _notifPollInterval=setInterval(async()=>{
    if(!CU?.email) return;
    try{
      const{data}=await DB.from('lhs_notifications')
        .select('*').eq('user_email',CU.email).eq('is_read',false)
        .order('created_at',{ascending:false}).limit(50);
      if(data?.length){
        const all=S.get('lhs:notifications')||[];
        // Merge new ones
        data.forEach(n=>{if(!all.find(x=>x.id===n.id)) all.push(n);});
        S.set('lhs:notifications',all);
        refreshNotifBadge();
      }
    }catch{}
  },60000);
}

// ── WO + APPOINTMENT COMPLETION BAR ──────────────────────────────────────────
function calcWOCompletion(woId){
  const apts=(S.get('lhs:appointments')||[]).filter(a=>a.wo_id===woId);
  if(!apts.length) return 0;
  const totalPct=apts.reduce((s,a)=>s+(a.pct_complete||0),0);
  return Math.round(totalPct/apts.length);
}

function woCompletionBar(woId,compact=false){
  const apts=(S.get('lhs:appointments')||[]).filter(a=>a.wo_id===woId);
  if(!apts.length) return'';
  const pct=calcWOCompletion(woId);
  const completed=apts.filter(a=>a.status==='Completed'||a.pct_complete>=100).length;
  const color=pct>=100?'var(--green)':pct>=50?'var(--navy)':'var(--amber)';
  if(compact) return`<div style="display:flex;align-items:center;gap:6px;font-size:11px">
    <div style="flex:1;height:4px;background:var(--bdr);border-radius:2px">
      <div style="width:${pct}%;height:4px;background:${color};border-radius:2px;transition:width .4s"></div>
    </div>
    <span style="color:${color};font-weight:600;min-width:28px">${pct}%</span>
  </div>`;
  return`<div style="margin:12px 0">
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
      <span style="color:var(--muted)">WO Completion — ${completed}/${apts.length} appointment${apts.length!==1?'s':''} done</span>
      <span style="font-weight:700;color:${color}">${pct}%</span>
    </div>
    <div style="height:8px;background:var(--bdr);border-radius:4px;overflow:hidden">
      <div style="width:${pct}%;height:8px;background:${color};border-radius:4px;transition:width .5s"></div>
    </div>
  </div>`;
}

async function completeTask(id){

async function svAddTask(){
  const title=v('task-title').trim();
  if(!title){tst('Title required','error');return}
  const [email,name]=(v('task-user')||'').split('|');
  if(!email){tst('Select a user','error');return}
  const task={
    assigned_to_email:email,assigned_to_name:name,
    assigned_by:CU.name,title,description:v('task-desc')||null,
    due_date:v('task-due')||null,priority:v('task-pri')||'Normal',
    status:'Open',created_at:new Date().toISOString(),updated_at:new Date().toISOString(),
  };
  const tasks=S.get('lhs:tasks')||[];
  tasks.push({...task,id:'task_'+Date.now()});S.set('lhs:tasks',tasks);
  try{await DB.from('lhs_tasks').insert(task);}catch{}
  // Notify the assignee
  await sendNotification({
    user_email:email,user_name:name,type:'task',
    title:`New task: ${title}`,
    body:`Assigned by ${CU.name}${task.due_date?' · Due '+new Date(task.due_date).toLocaleDateString():''}`,
    from_user:CU.name,
  });
  cMod();tst(`Task assigned to ${name}`,'success');
}

async function updateMaterial(matId,aptId,woId,newQty){
  const qty=parseInt(newQty)||1;
  const mats=S.get('lhs:wo_materials')||[];
  const m=mats.find(x=>x.id===matId);
  if(!m) return;
  const oldQty=m.qty_used||1;
  m.qty_used=qty;
  S.set('lhs:wo_materials',mats);
  if(matId&&!matId.startsWith('mat_')) await dbUpdate('lhs:wo_materials',matId,{qty_used:qty});
  await logWOAudit(woId,'Material Updated',`${m.item_name||m.sku}: qty ${oldQty}→${qty}`);
}

async function deleteMaterial(matId,aptId,woId){
  if(!confirm('Remove this material from the appointment?')) return;
  const mats=S.get('lhs:wo_materials')||[];
  const m=mats.find(x=>x.id===matId);
  if(!m) return;
  const idx=mats.indexOf(m); if(idx>=0) mats.splice(idx,1);
  S.set('lhs:wo_materials',mats);
  if(matId&&!matId.startsWith('mat_')) await dbDelete('lhs:wo_materials',matId);
  await logWOAudit(woId,'Material Removed',`${m.item_name||m.sku} x${m.qty_used||1}`);
  // Refresh the modal
  const list=document.getElementById('aptd-matlist');
  if(list){
    const remaining=mats.filter(x=>x.appointment_id===aptId);
    list.innerHTML=remaining.length?remaining.map(x=>`
    <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;border:1px solid var(--bdr);border-radius:6px;margin-bottom:4px;font-size:13px">
      <span style="flex:1;font-weight:500">${x.item_name||x.sku}</span>
      <span style="color:var(--muted)">Qty:</span>
      <input type="number" value="${x.qty_used||1}" min="1" style="width:52px;padding:3px 6px;border:1px solid var(--bdr);border-radius:4px;font-size:12px;text-align:center"
        onchange="updateMaterial('${x.id||''}','${aptId}','${woId}',this.value)">
      <span style="font-family:'DM Mono',monospace;min-width:60px;text-align:right">$${((x.qty_used||0)*(x.unit_cost||0)).toFixed(2)}</span>
      <button onclick="deleteMaterial('${x.id||''}','${aptId}','${woId}')"
        style="background:none;border:1px solid var(--red);color:var(--red);border-radius:4px;padding:2px 6px;cursor:pointer;font-size:11px">&#215;</button>
    </div>`).join(''):'<div style="font-size:12px;color:var(--muted)">No materials logged yet</div>';
  }
  tst('Material removed','info');
}

// ── ADDRESS VERIFICATION ──────────────────────────────────────────────────────
// Uses US Census Bureau geocoding API (free, no key required)
async function verifyAddress(){
  const street=v('woc-cad')||v('ewo-caddr')||v('cf-ad')||'';
  const city=v('woc-cct')||v('ewo-ccity')||v('cf-ct')||'';
  const stateRaw=v('woc-cst')||v('ewo-cstate')||v('cf-st')||'';
  const state=stateRaw.includes(' - ')?stateRaw.split(' - ')[0]:stateRaw;
  const zip=v('woc-czip')||v('ewo-czip')||v('cf-zip')||'';
  if(!street){tst('Enter a street address first','error');return}
  const addr=encodeURIComponent(`${street}, ${city}, ${state} ${zip}`.trim());
  tst('Verifying address...','info');
  try{
    const res=await fetch(`https://geocoding.geo.census.gov/geocoder/locations/onelineaddress?address=${addr}&benchmark=2020&format=json`);
    const data=await res.json();
    const matches=data?.result?.addressMatches||[];
    if(!matches.length){
      tst('Address not verified — check spelling or try ZIP code','warning');
      return;
    }
    const m=matches[0];
    const addrComp=m.addressComponents;
    // Auto-fill fields with standardized address
    const setField=(ids,val)=>{
      ids.forEach(id=>{const el=document.getElementById(id);if(el&&val) el.value=val;});
    };
    setField(['woc-cad','ewo-caddr','cf-ad'],
      `${addrComp.streetName?addrComp.preQualifier?addrComp.preQualifier+' ':''+(addrComp.fromAddress||'')+ ' '+addrComp.streetName+(addrComp.suffixType?' '+addrComp.suffixType:''):m.matchedAddress.split(',')[0].trim()}`);
    setField(['woc-cct','ewo-ccity','cf-ct'], addrComp.city||city);
    setField(['woc-czip','ewo-czip','cf-zip'], addrComp.zip||zip);
    // Set state dropdown
    const stateCode=addrComp.state||state;
    ['woc-cst','ewo-cstate','cf-st'].forEach(id=>{
      const el=document.getElementById(id);
      if(!el) return;
      [...el.options].forEach(o=>{
        if(o.value===stateCode||o.value.startsWith(stateCode)||o.text.startsWith(stateCode)) o.selected=true;
      });
    });
    // Show coordinates for mapping
    const lat=m.coordinates?.y?.toFixed(6);
    const lng=m.coordinates?.x?.toFixed(6);
    tst(`✓ Address verified: ${m.matchedAddress}${lat?' ('+lat+', '+lng+')':''}`, 'success');
  }catch(e){
    tst('Address verification unavailable — check internet connection','warning');
    console.warn('Address verify error:',e.message);
  }
}

function autoVerifyAddress(){
  const street=v('woc-cad');
  const city=v('woc-cct');
  if(street&&city) setTimeout(verifyAddress, 500);
}

// ── NOTIF USER MULTI-SELECT ────────────────────────────────────────────────────
const _notifSelected={};  // email -> name

function toggleNotifUser(email,name){
  const safeKey=email.replace(/[^a-z0-9]/gi,'_');
  const checkEl=document.querySelector('.notif-check-'+safeKey);
  if(_notifSelected[email]){
    delete _notifSelected[email];
    if(checkEl) checkEl.style.display='none';
  } else {
    _notifSelected[email]=name;
    if(checkEl) checkEl.style.display='inline';
  }
  renderNotifTags();
}

function renderNotifTags(){
  const container=document.getElementById('notif-selected-tags');
  if(!container) return;
  container.innerHTML=Object.entries(_notifSelected).map(([email,name])=>`
    <span style="background:var(--navy);color:white;padding:3px 8px;border-radius:12px;font-size:11px;
      display:flex;align-items:center;gap:4px;cursor:pointer"
      onclick="toggleNotifUser('${email}','${name}')">
      ${name} <span style="font-size:13px;line-height:1">&#215;</span>
    </span>`).join('');
  // Keep hidden checkboxes for svWONote to read
  let hiddenInputs=document.getElementById('notif-hidden-inputs');
  if(!hiddenInputs){
    hiddenInputs=document.createElement('div');
    hiddenInputs.id='notif-hidden-inputs';
    hiddenInputs.style.display='none';
    container.parentNode.appendChild(hiddenInputs);
  }
  hiddenInputs.innerHTML=Object.entries(_notifSelected).map(([email,name])=>
    `<input type="checkbox" class="note-notif-check" value="${email}" data-name="${name}" checked>`
  ).join('');
}

function filterNotifUsers(q){
  const rows=document.querySelectorAll('.notif-user-row');
  const ql=(q||'').toLowerCase();
  rows.forEach(row=>{
    const name=(row.dataset.name||'').toLowerCase();
    const role=(row.dataset.role||'').toLowerCase();
    row.style.display=!ql||name.includes(ql)||role.includes(ql)?'flex':'none';
  });
  document.getElementById('notif-user-dropdown').style.display='block';
}

// Close notif dropdown on outside click
document.addEventListener('click',e=>{
  const dropdown=document.getElementById('notif-user-dropdown');
  const search=document.getElementById('notif-user-search');
  if(dropdown&&!dropdown.contains(e.target)&&e.target!==search){
    dropdown.style.display='none';
  }
});
