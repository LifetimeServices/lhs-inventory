<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lifetime Management System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0f1f3d;--navym:#1a2f52;--navyl:#243a63;--teal:#3abfbf;--teall:#5dd0d0;
--white:#fff;--red:#d94040;--green:#2d8c4e;--amber:#d97c20;
--text:#1a1a2e;--muted:#6b7280;--bdr:#e2e0db;--surf:#fafaf8;
--sh:0 2px 12px rgba(15,31,61,.10);--shlg:0 8px 32px rgba(15,31,61,.18);--r:10px;--rl:16px}
*{box-sizing:border-box;margin:0;padding:0}
@keyframes spin{to{transform:rotate(360deg)}}
body{font-family:'DM Sans',sans-serif;background:#f0ece3;color:var(--text);min-height:100vh}
/* LOGIN */
#ls{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--navy) 0%,var(--navym) 60%,#1e3a5f 100%);position:relative}
#ls::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(58,191,191,.03) 40px,rgba(58,191,191,.03) 80px)}
.lc{background:var(--white);border-radius:var(--rl);padding:48px 44px;width:420px;box-shadow:var(--shlg);position:relative;z-index:1}
.lc .mark{text-align:center;margin-bottom:32px}
.lc .mark .m{display:inline-flex;align-items:center;background:var(--navy);color:var(--teal);
  padding:10px 20px;border-radius:8px;font-size:22px;font-weight:700;letter-spacing:.05em}
.lc .mark p{color:var(--muted);font-size:13px;margin-top:10px}
.lc h2{font-size:22px;font-weight:600;margin-bottom:24px;color:var(--navy)}
.fg{margin-bottom:18px}
.fg label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px}
.fg input{width:100%;padding:11px 14px;border:1.5px solid var(--bdr);border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--surf);transition:border-color .15s}
.fg input:focus{outline:none;border-color:var(--navy)}
.btnl{width:100%;padding:13px;background:var(--navy);color:var(--teal);border:none;border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s}
.btnl:hover{background:var(--navyl)}
.lerr{color:var(--red);font-size:13px;margin-top:10px;text-align:center;display:none}
.lhint{margin-top:18px;padding-top:14px;border-top:1px solid var(--bdr);font-size:12px;color:var(--muted);text-align:center}
/* APP */
#app{display:none;flex-direction:column;min-height:100vh}
.tb{background:var(--navy);display:flex;flex-direction:column;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.tb-row1{height:56px;display:flex;align-items:center;padding:0 20px;gap:12px}
.tb-row2{display:flex;align-items:center;padding:2px 20px 4px;gap:8px;border-top:1px solid rgba(255,255,255,.08)}
.tbl{color:var(--teal);font-size:15px;font-weight:700;letter-spacing:.06em;white-space:nowrap}
.tbl span{color:rgba(255,255,255,.5);font-weight:300}
.tbn{display:flex;gap:2px;flex:1;overflow-x:auto;min-width:0}
.tbn::-webkit-scrollbar{display:none}
.tbn::-webkit-scrollbar-track{background:transparent}
.nb{padding:6px 14px;border-radius:6px;border:none;background:transparent;
  color:rgba(255,255,255,.6);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s}
.nb:hover{background:rgba(255,255,255,.08);color:var(--white)}
.nb.active{background:rgba(58,191,191,.18);color:var(--teal)}
.nb-back{color:var(--teal);border:1px solid rgba(58,191,191,.3)}
.nb-back:hover{background:rgba(58,191,191,.15);color:var(--teal)}
.tbr{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
.up{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;
  padding:5px 14px;color:rgba(255,255,255,.8);font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.rb{background:var(--teal);color:var(--navy);font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.lo{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);
  border-radius:6px;padding:5px 12px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .15s}
.lo:hover{border-color:var(--teal);color:var(--teal)}
.main{flex:1;padding:28px;max-width:1400px;margin:0 auto;width:100%}
.page{display:none}.page.active{display:block}
.pt{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:6px}
.ps{font-size:14px;color:var(--muted);margin-bottom:24px}
/* CARDS */
.card{background:var(--white);border-radius:var(--rl);padding:24px;box-shadow:var(--sh);margin-bottom:20px}
.ct{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:16px}
/* STATS */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.sc{background:var(--white);border-radius:var(--rl);padding:20px 22px;box-shadow:var(--sh);border-left:4px solid transparent}
.sc.n{border-left-color:var(--navy)}.sc.g{border-left-color:var(--teal)}
.sc.gr{border-left-color:var(--green)}.sc.r{border-left-color:var(--red)}.sc.a{border-left-color:var(--amber)}
.sl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
.sv{font-size:32px;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace}
.ss{font-size:12px;color:var(--muted);margin-top:4px}
/* TABLE */
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--bdr)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--navy);color:rgba(255,255,255,.85);padding:10px 14px;text-align:left;
  font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--bdr);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#faf9f6}
.bx{display:inline-block;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600}
.bg{background:#dcfce7;color:#15803d}.br{background:#fee2e2;color:#b91c1c}
.ba{background:#fef3c7;color:#b45309}.bb{background:#dbeafe;color:#1d4ed8}
.bgr{background:#f3f4f6;color:#6b7280}.bn{background:#e0e7f5;color:var(--navy)}
/* FORM */
.fr{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:16px}
.fl label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.fl input,.fl select,.fl textarea{width:100%;padding:10px 13px;border:1.5px solid var(--bdr);border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--surf);transition:border-color .15s}
.fl input:focus,.fl select:focus,.fl textarea:focus{outline:none;border-color:var(--navy)}
.fl textarea{resize:vertical;min-height:80px}
/* BUTTONS */
.btn{padding:9px 20px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.02em}
.btn-n{background:var(--navy);color:var(--teal)}.btn-n:hover{background:var(--navyl)}
.btn-g{background:var(--teal);color:var(--navy)}.btn-g:hover{background:var(--teall)}
.btn-o{background:transparent;border:1.5px solid var(--bdr);color:var(--text)}
.btn-o:hover{border-color:var(--navy);color:var(--navy)}
.btn-r{background:var(--red);color:var(--white)}
.sm{padding:6px 12px;font-size:12px}
.br2{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
/* ALERTS */
.al{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.al-r{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5}
.al-g{background:#dcfce7;color:#15803d;border:1px solid #86efac}
.al-a{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.al-b{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}
/* SECTION HDR */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.sh h3{font-size:16px;font-weight:600;color:var(--navy)}
/* TABS */
.tabs{display:flex;gap:4px;background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:4px;margin-bottom:20px;width:fit-content}
.tab{padding:8px 18px;border-radius:7px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s}
.tab.active{background:var(--navy);color:var(--teal)}
/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.mo.open{display:flex}
.md{background:var(--white);border-radius:var(--rl);padding:28px;width:820px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:var(--shlg)}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mh h3{font-size:18px;font-weight:700;color:var(--navy)}
.mx{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}
/* QTY */
.ql{color:var(--red);font-family:'DM Mono',monospace;font-size:13px;font-weight:500}
.qo{color:var(--green);font-family:'DM Mono',monospace;font-size:13px;font-weight:500}
.qw{color:var(--amber);font-family:'DM Mono',monospace;font-size:13px;font-weight:500}
/* LINE TBL */
.lt{width:100%;border-collapse:collapse;margin-top:8px}
.lt th{background:var(--navy);color:rgba(255,255,255,.85);padding:8px 10px;text-align:left;font-size:11px;text-transform:uppercase}
.lt td{padding:8px 10px;border-bottom:1px solid var(--bdr)}
.lt input,.lt select{width:100%;padding:5px 8px;border:1px solid var(--bdr);border-radius:5px;font-size:13px;font-family:'DM Sans',sans-serif}
.dx{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;font-weight:700}
/* INT */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ic{border:1.5px solid var(--bdr);border-radius:var(--r);padding:18px}
.ic.on2{border-color:#86efac;background:#f0fdf4}.ic.off2{border-color:#fca5a5;background:#fff5f5}
.in2{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px}
.is2{font-size:12px;font-weight:600}.is2.on{color:var(--green)}.is2.off{color:var(--red)}
.id2{font-size:13px;color:var(--muted);margin:8px 0}
.ifg{margin:10px 0 8px}
.ifg label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:4px}
.ifg input{width:100%;padding:8px 10px;border:1px solid var(--bdr);border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif}
/* TOAST */
#tst{position:fixed;bottom:24px;right:24px;padding:13px 20px;background:var(--navy);color:var(--white);
  border-radius:10px;font-size:14px;box-shadow:var(--shlg);z-index:999;
  transform:translateY(80px);opacity:0;transition:all .3s;max-width:340px}
#tst.show{transform:translateY(0);opacity:1}
#tst.success{border-left:4px solid var(--green)}
#tst.error{border-left:4px solid var(--red)}
#tst.info{border-left:4px solid var(--teal)}
/* LAYOUT */
.tc{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:700px){.tc,.ig{grid-template-columns:1fr}.sg{grid-template-columns:1fr 1fr}.fr{grid-template-columns:1fr}.tbl span{display:none}}
</style>

// Helper: get subtypes for a division+jobtype (from cache or hierarchy)
function getSubtypes(division, jobType){
  const cached=S.get('lhs:job_subtypes')||[];
  const fromDB=cached.filter(r=>r.division===division&&r.job_type===jobType&&r.active!==false).map(r=>r.subtype);
  if(fromDB.length>0) return fromDB;
  return JOB_HIERARCHY[division]?.[jobType]?.subtypes||[];
}

// Helper: get classifications for a division+jobtype+subtype
function getClassifications(division, jobType, subtype){
  const cached=S.get('lhs:job_classifications')||[];
  const fromDB=cached.filter(r=>r.division===division&&r.job_type===jobType&&r.subtype===subtype&&r.active!==false).map(r=>r.classification);
  if(fromDB.length>0) return fromDB;
  return JOB_HIERARCHY[division]?.[jobType]?.classifications?.[subtype]||[];
}

const _AUDIT={};   // wo_id -> [entries] — session storage

  get(k){
    if(_C[k]!==undefined) return _C[k];
    try{const v=localStorage.getItem(k);const p=v?JSON.parse(v):null;if(p!==null)_C[k]=p;return p}catch{return null}
  },
  set(k,v){
    _C[k]=v;
    try{localStorage.setItem(k,JSON.stringify(v))}catch{}
  }
};

// Pull all data from Supabase into cache on login
async function warmCache(){
  try{
    const loads=Object.entries(TBL).map(async([k,tbl])=>{
      try{
        let query=DB.from(tbl).select('*');
        // Only order by created_at for tables that have it
        const noOrderTbls=['lhs_wo_sequence','lhs_leads','lhs_opportunities','lhs_activities'];
        if(!noOrderTbls.includes(tbl)) query=query.order('created_at',{ascending:true});
        const{data,error}=await query;
        if(!error&&data&&data.length>0){
          S.set(k,data);
          console.log('Loaded',tbl,data.length,'rows from Supabase');
        } else if(!error&&data&&data.length===0){
          // Table exists but empty - keep whatever is in localStorage
          console.log(tbl,'is empty in Supabase, keeping local cache');
        }
      }catch(e){console.warn('Failed to load',tbl,e.message);}
    });
    await Promise.all(loads);
    // Load PO sequence
    try{
      const{data:seq}=await DB.from('lhs_po_sequence').select('last_seq').eq('id',1).single();
      if(seq) S.set('lhs:poseq',seq.last_seq);
    }catch{}
    rebuildLists();
    // Populate session stores from loaded cache so notes/audit show immediately
    (S.get('lhs:wo_notes')||[]).forEach(n=>{
      if(!n.wo_id) return;
      if(!_NOTES[n.wo_id]) _NOTES[n.wo_id]=[];
      if(!_NOTES[n.wo_id].find(x=>x.id===n.id)) _NOTES[n.wo_id].push(n);
    });
    (S.get('lhs:wo_audit')||[]).forEach(a=>{
      if(!a.wo_id) return;
      if(!_AUDIT[a.wo_id]) _AUDIT[a.wo_id]=[];
      if(!_AUDIT[a.wo_id].find(x=>x.id===a.id)) _AUDIT[a.wo_id].push(a);
    });
    console.log('Cache warm complete');
  }catch(e){console.warn('warmCache failed, using local cache:',e.message);}
}

// Push a full table back to Supabase (upsert)
async function dbPush(key){
  const tbl=TBL[key]; if(!tbl) return;
  const rows=S.get(key)||[];
  if(!rows.length) return;
  try{
    const{error}=await DB.from(tbl).upsert(rows,{onConflict:'id',ignoreDuplicates:false});
    if(error) console.warn('dbPush error',tbl,error.message);
  }catch(e){console.warn('dbPush failed',tbl,e.message);}
}

// Insert a single new row
async function dbInsert(key,row){
  const tbl=TBL[key]; if(!tbl){console.warn('dbInsert: no table for key',key);return null;}
  try{
    // Remove undefined/null id to let Supabase generate UUID
    const cleanRow={...row};
    if(!cleanRow.id) delete cleanRow.id;
    const{data,error}=await DB.from(tbl).insert(cleanRow).select().single();
    if(error){
      console.error('dbInsert error',tbl,error.message,error.details,error.hint);
      return null;
    }
    return data;
  }catch(e){
    console.error('dbInsert failed',tbl,e.message);
    return null;
  }
}

// Delete a row by id
async function dbDelete(key,id){
  const tbl=TBL[key]; if(!tbl) return;
  try{
    const{error}=await DB.from(tbl).delete().eq('id',id);
    if(error) console.warn('dbDelete error',tbl,error.message);
  }catch(e){console.warn('dbDelete failed',tbl,e.message);}
}

// Update a row by id
async function dbUpdate(key,id,updates){
  const tbl=TBL[key]; if(!tbl) return;
  try{
    const{error}=await DB.from(tbl).update(updates).eq('id',id);
    if(error) console.warn('dbUpdate error',tbl,error.message);
  }catch(e){console.warn('dbUpdate failed',tbl,e.message);}
}

// Get next PO sequence number (atomic via Supabase)
async function getNextPOSeq(){
  try{
    const{data}=await DB.rpc('increment_po_seq');
    if(data) return data;
  }catch{}
  // Fallback: local increment
  const n=(S.get('lhs:poseq')||0)+1;
  S.set('lhs:poseq',n);
  return n;
}

function seed(){
  // Data is loaded from Supabase via warmCache() on login.
  // This function no longer seeds local defaults to prevent
  // overwriting real data when a new index.html is deployed.
  rebuildLists();
}

function rebuildLists(){
  const locs=S.get('lhs:locs')||[];
  WH=locs.filter(l=>l.active&&l.type==='Warehouse').map(l=>l.name);
  VH=locs.filter(l=>l.active&&(l.type==='Service Van'||l.type==='Sales Vehicle')).map(l=>l.name);
}

let CU=null;

async function doLogin(){
  const u=document.getElementById('lu').value.trim().toLowerCase();
  const p=document.getElementById('lp').value.trim();
  const errEl=document.getElementById('lerr');
  const btn=document.querySelector('.btnl');
  if(btn){btn.textContent='Signing in...';btn.disabled=true;}

  let user=null;

  // Step 1: Try Supabase first — works from ANY browser, ANY device
  try{
    const{data,error}=await DB.from('lhs_users')
      .select('*')
      .ilike('email',u)
      .eq('active',true)
      .single();
    if(!error&&data){
      const pwMatch=data.password_hash===p||data.pw===p;
      if(pwMatch){
        user={
          name:data.name,
          email:data.email,
          pw:data.password_hash||data.pw,
          role:data.role||'Van Tech',
          loc:data.home_location||data.loc||'',
          division:data.division||'',
          region:data.region||'',
          manager:data.manager||'',
          id:data.id,
        };
      }
    }
  }catch(e){console.warn('Supabase login failed, trying local:',e.message);}

  // Step 2: Fallback to hardcoded USERS if Supabase unreachable
  if(!user){
    const local=USERS.find(x=>x.email.toLowerCase()===u&&x.pw===p);
    if(local) user=local;
  }

  if(btn){btn.textContent='Sign In →';btn.disabled=false;}

  if(!user){
    errEl.style.display='block';
    errEl.textContent='Incorrect email or password. Please try again.';
    return;
  }

  errEl.style.display='none';
  CU=user;
  sessionStorage.setItem('lhs_s',JSON.stringify({e:user.email,p:user.pw}));
  startApp();
}

function uBal(i,o,pr){const now=pi2('rl'+i);const bal=o-pr-now;const el=g('bal'+i);
  if(el){el.textContent=bal>0?bal+' left':'&#10003; Done';el.style.color=bal>0?'var(--amber)':'var(--green)';}}
function postRecv(pi3){
  const pos=S.get('lhs:pos')||[];const ls=S.get('lhs:ls')||[];const p=pos[pi3];let short=false;
  const dt=v('rdt');
  (p.lines||[]).forEach((l,i)=>{
    const now=pi2('rl'+i);
    l.qtyReceived=(l.qtyReceived||0)+now;
    l.status=l.qtyReceived>=l.qtyOrdered?'Received':'Short';
    if(l.status==='Short') short=true;
    if(now>0){const ex=ls.find(r=>r.sku===l.sku&&r.location===p.location);
      if(ex) ex.qty+=now; else ls.push({sku:l.sku,item:l.item,location:p.location,qty:now,min:0,max:0,bin:''});}
  });
  p.status=(p.lines||[]).every(l=>l.status==='Received')?'Received in Full':'Partial - Awaiting Balance';
  p.receivedDate=dt;p.receivedBy=CU.name;
  p.receiptValue=(p.lines||[]).reduce((s,l)=>s+(l.qtyReceived||0)*l.cost,0);
  if(short) p.notes='Short: '+(p.lines||[]).filter(l=>l.status==='Short')
    .map(l=>`${l.item} (${l.qtyReceived}/${l.qtyOrdered})`).join(', ');
  pos[pi3]=p; S.set('lhs:pos',pos); S.set('lhs:ls',ls);
  tst(p.status==='Received in Full'?`${p.id} fully received`:`${p.id} partial — balance due`,
    p.status==='Received in Full'?'success':'info');
  showPage('receive');
}

function addXL(){

function xlI(i,s){
  const it=_xi.find(x=>x.sku===s.value);
  g('xls'+i).value=s.value; _xl[i]={sku:s.value,item:it?.name||''}; xAvail(i);
}
function xAvail(i){
  const from=v('xf');const sku=_xl[i]?.sku; if(!from||!sku) return;
  let q=0;
  if(WH.includes(from)) q=(S.get('lhs:ls')||[]).find(r=>r.sku===sku&&r.location===from)?.qty||0;
  else q=(S.get('lhs:vi')||[]).find(r=>r.sku===sku&&r.vehicle===from)?.qty||0;
  const el=g('xla'+i);if(el){el.textContent=q;el.style.color=q>0?'var(--green)':'var(--red)';}
}
function xUpA(){_xl.forEach((_,i)=>xAvail(i));}
function postXfr(){
  const from=v('xf');const to=v('xt');const reason=v('xr');const notes=v('xn');
  if(!from||!to){tst('Select From and To','error');return}
  if(from===to){tst('From and To cannot match','error');return}
  const lines=_xl.filter(l=>l.sku); if(!lines.length){tst('Add at least one item','error');return}
  const ls=S.get('lhs:ls')||[];const vi=S.get('lhs:vi')||[];const xfrs=S.get('lhs:xfrs')||[];
  const errs=[];
  lines.forEach((l,i)=>{
    const qty=pi2('xlq'+i); if(!qty) return;
    if(WH.includes(from)){const r=ls.find(x=>x.sku===l.sku&&x.location===from);
      if(!r||r.qty<qty){errs.push(`Not enough ${l.item} at ${from}`);return} r.qty-=qty;
    }else{const r=vi.find(x=>x.sku===l.sku&&x.vehicle===from);
      if(!r||r.qty<qty){errs.push(`Not enough ${l.item} in ${from}`);return} r.qty-=qty;}
    if(WH.includes(to)){const r=ls.find(x=>x.sku===l.sku&&x.location===to);
      if(r) r.qty+=qty; else ls.push({sku:l.sku,item:l.item,location:to,qty,min:0,max:0,bin:''});
    }else{const r=vi.find(x=>x.sku===l.sku&&x.vehicle===to);
      if(r) r.qty+=qty; else vi.push({sku:l.sku,item:l.item,vehicle:to,division:'',qty,min:0,max:0,tech:''});}
    xfrs.push({date:td(),from,to,sku:l.sku,item:l.item,qty,reason,notes:notes||'',by:CU.name});
  });
  if(errs.length){tst(errs[0],'error');return}
  S.set('lhs:ls',ls);S.set('lhs:vi',vi);S.set('lhs:xfrs',xfrs);
  _xl=[]; tst(`${lines.length} item(s) transferred`,'success'); showPage('transfer');
}
function restMax(){
  const to=v('xt');const from=v('xf');
  if(!VH.includes(to)){tst('Select a van as destination','error');return}
  if(!WH.includes(from)){tst('Select a warehouse as source','error');return}
  const vi=S.get('lhs:vi')||[];const need=vi.filter(r=>r.vehicle===to&&r.max>0&&r.qty<r.max);
  if(!need.length){tst(`${to} is at max`,'info');return}
  _xi=S.get('lhs:items')||[];_xl=[];
  const tb=g('xtb'); if(tb) tb.innerHTML='';
  need.forEach((vi2,i)=>{
    _xl.push({sku:vi2.sku,item:vi2.item,qty:vi2.max-vi2.qty});
    const tr=document.createElement('tr'); tr.id='xl'+i;
    tr.innerHTML=`<td style="font-weight:500">${vi2.item||vi2.sku}</td>
    <td><input id="xls${i}" value="${vi2.sku}" readonly style="width:85px;background:#f5f5f5"></td>
    <td id="xla${i}" style="color:var(--green);font-family:'DM Mono',monospace">&#8212;</td>
    <td><input type="number" id="xlq${i}" value="${vi2.max-vi2.qty}" style="width:55px"></td>
    <td><button class="dx" onclick="this.closest('tr').remove()">&#215;</button></td>`;
    if(tb) tb.appendChild(tr);
  });
  need.forEach((_,i)=>xAvail(i)); tst(`Loaded ${need.length} items to restock ${to}`,'info');
}

async function svLoc(){

  const addrParts=[street,city,state,zip].filter(Boolean);

  const newLoc={name,type,region,state,addr,address:addr,city,zip,
    active:true,created_at:new Date().toISOString()};
  const saved=await dbInsert('lhs:locs',newLoc);

function oAddSubtype(div,type){

async function svAddSubtype(div,type){
  const name=v('ns0'); if(!name){tst('Name required','error');return}
  const row={division:div,job_type:type,subtype:name,active:true,created_at:new Date().toISOString()};
  const saved=await dbInsert('lhs:job_subtypes',row);
  if(!saved){tst('Failed to save subtype','error');return}
  const subs=S.get('lhs:job_subtypes')||[]; subs.push(saved); S.set('lhs:job_subtypes',subs);
  window._woSettingsSub=name;

}

// EDIT SUBTYPE
function oEditSubtype(div,type,sub){
  oMod(`Edit Subtype`,`
  <div class="fl" style="margin-bottom:16px"><label>Subtype Name</label>
    <input id="es0" value="${sub}"></div>
  <div class="br2">
    <button class="btn btn-n" onclick="svEditSubtype('${div}','${type}','${sub.replace(/'/g,"\'")}')">Save</button>
    <button class="btn btn-o" onclick="cMod()">Cancel</button>
  </div>`);
}
async function svEditSubtype(div,type,oldName){
  const newName=v('es0'); if(!newName){tst('Name required','error');return}
  const subs=S.get('lhs:job_subtypes')||[];
  const rec=subs.find(r=>r.division===div&&r.job_type===type&&r.subtype===oldName);
  if(rec?.id) await dbUpdate('lhs:job_subtypes',rec.id,{subtype:newName});
  if(rec) rec.subtype=newName;
  S.set('lhs:job_subtypes',subs);
  window._woSettingsSub=newName;
  cMod(); tst('Updated','success'); g('atab').innerHTML=aWOSettings();
}

// DELETE SUBTYPE
async function delSubtype(div,type,sub){
  if(!confirm(`Delete subtype "${sub}"? This will also remove its classifications.`))return;
  const subs=S.get('lhs:job_subtypes')||[];
  const rec=subs.find(r=>r.division===div&&r.job_type===type&&r.subtype===sub);
  if(rec?.id) await dbDelete('lhs:job_subtypes',rec.id);
  const idx=subs.indexOf(rec); if(idx>=0) subs.splice(idx,1);
  S.set('lhs:job_subtypes',subs);
  window._woSettingsSub='';
  tst(`${sub} deleted`,'info'); g('atab').innerHTML=aWOSettings();
}

async function svAddUser(){
  const name=v('au0'),email=v('au1'),pw=v('au2'),role=v('au3');
  const division=v('au4'),region=v('au5'),loc=v('au6'),manager=v('au7');
  if(!name||!email||!pw){tst('Name, email, and password required','error');return}
  if(!email.includes(_e('QA=='))){tst('Enter a valid email address','error');return}

  // Check duplicate in Supabase directly
  try{
    const{data:existing}=await DB.from('lhs_users').select('id').ilike('email',email).single();
    if(existing){tst('A user with that email already exists','error');return}
  }catch{}

  const include_dispatch=document.getElementById('au-disp')?.value!=='false';
  const timesheet_needed=document.getElementById('au-ts')?.value!=='false';
  const newUser={
    name,
    email:email.toLowerCase().trim(),
    password_hash:pw,
    role,
    home_location:loc||'',
    division:division||'',
    region:region||'',
    manager:manager||'',
    active:true,
    include_dispatch,
    timesheet_needed,
  };

  // Save to Supabase
  let saved=null;
  try{
    const{data,error}=await DB.from('lhs_users').insert(newUser).select().single();
    if(error){
      console.error('Add user error:',error.message,error.details,error.hint);
      tst('Save failed: '+error.message,'error');
      return;
    }
    saved=data;
  }catch(e){
    console.error('Add user exception:',e.message);
    tst('Save failed — check console for details','error');
    return;
  }

  // Update local cache with the saved record (includes the real UUID from Supabase)
  const users=S.get('lhs:users')||[];
  users.push(saved);
  S.set('lhs:users',users);

  cMod();
  tst(`${name} added successfully. They can now log in from any device.`,'success');
  g('atab').innerHTML=aUsers();
}

  if(vens[i].id) await dbUpdate('lhs:vens',vens[i].id,updates);
  const vi=VENS.indexOf(old);if(vi>=0) VENS[vi]=updates.name;
  cMod();tst('Vendor updated','success');g('atab').innerHTML=aVens();
}
async function delVen(i){
  const vens=S.get('lhs:vens')||[];
  const name=typeof vens[i]==='string'?vens[i]:vens[i].name;
  if(!confirm(`Delete vendor "${name}"?`))return;
  if(vens[i].id) await dbDelete('lhs:vens',vens[i].id);
  vens.splice(i,1);S.set('lhs:vens',vens);
  const vi=VENS.indexOf(name);if(vi>=0) VENS.splice(vi,1);
  tst('Vendor deleted','info');g('atab').innerHTML=aVens();
}

function renderDispBoard(){
  const days=_dispView==='day'?1:_dispView==='2day'?2:3;
  const dates=[];
  for(let i=0;i<days;i++){
    const d=new Date(_dispDate+'T12:00:00');
    d.setDate(d.getDate()+i);
    dates.push(d.toISOString().split('T')[0]);
  }

  // Day view: 6am-8pm. Multi-day: 7am-5pm (tighter, fits screen)
  const startHr=days===1?6:7;
  const endHr=days===1?20:17;
  const totalHrs=endHr-startHr;
  const labelW=160;
  // Make columns fill the screen evenly
  // .main has max-width:1400px and padding:28px each side = 56px total
  // Must cap against that or multi-day panels overflow the container and get clipped
  const mainW=Math.min(window.innerWidth||1200,1400)-56;
  const availW=Math.max(600,mainW-labelW-24);
  const pxPerHr=days===1?80:Math.floor(availW/(days*totalHrs));
  const totalWidth=totalHrs*pxPerHr;

  // Get all appointments for these dates
  const allApts=S.get('lhs:appointments')||[];
  const allTechs=S.get('lhs:apt_techs')||[];
  const allWOs=S.get('lhs:work_orders')||[];
  let greyBlocks=[];try{greyBlocks=JSON.parse(localStorage.getItem('lms_grey_blocks')||'[]');}catch{}

  // Filter by region
  // Filter WOs by region - normalize state to 2-letter abbrev
  const filteredWOs=_dispRegion==='all'?allWOs:
    allWOs.filter(w=>{
      const raw=(w.customer_state||'').trim();
      if(!raw) return true; // no state = show in all regions
      const state=raw.length<=3?raw.toUpperCase():raw.toUpperCase().slice(0,2);
      return REGIONS[_dispRegion]?.states.includes(state);
    });
  const filteredWOIds=new Set(filteredWOs.map(w=>w.id));

  // Group techs by division
  const users=S.get('lhs:users')||[];
  // Show users with include_dispatch=true (default true if not set)
  // OR with field roles regardless of setting
  // include_dispatch=true (or unset) = show on board regardless of role
  // Region filter: if a region tab is active, only show techs assigned to that region
  // Techs with no region set appear under ALL region tabs
  const techUsers=users.filter(u=>{
    if(u.include_dispatch===false||u.include_dispatch==='false') return false;
    if(_dispRegion!=='all'&&u.region&&u.region!==_dispRegion) return false;
    return true;
  });

  // Always show ALL divisions from DIVS constant
  let divGroups={};
  DIVS.forEach(div=>{ divGroups[div]={apts:[],techs:new Set()}; });

  // Add appointments to relevant divisions (apts only — tech rows are owned by home division only)
  allApts.filter(a=>dates.includes(a.scheduled_date)&&filteredWOIds.has(a.wo_id)).forEach(apt=>{
    const wo=allWOs.find(w=>w.id===apt.wo_id);
    if(!wo) return;
    if(!divGroups[wo.division]) divGroups[wo.division]={apts:[],techs:new Set()};
    divGroups[wo.division].apts.push(apt);
    // DO NOT add techs here — a tech's row only appears in their home division
  });

  // Add techs ONLY to their primary division row
  // Appointments assigned to them from other divisions still show in their home div
  techUsers.forEach(u=>{
    const rawDiv=(u.division||'').trim();
    if(!rawDiv) return;
    const matchedDiv=Object.keys(divGroups).find(d=>d.toLowerCase()===rawDiv.toLowerCase())||rawDiv;
    if(!divGroups[matchedDiv]) divGroups[matchedDiv]={apts:[],techs:new Set()};
    divGroups[matchedDiv].techs.add(u.name);
  });

  // Add appointments to the WO's division row (for display)
  // BUT: techs are pinned to their HOME division only — do NOT add them to foreign divisions
  // The WO block still shows in the correct division row via the apt loop above (divGroups[wo.division].apts)
  // Techs just show under their primary division regardless of which WO they're on

  // Always has divisions from DIVS constant so no empty state needed

  // Sort: use DIVS array order (which respects drag reorder + saved order)
  // Pinned divisions float to top within their saved position
  const sortedDivs=DIVS.filter(d=>divGroups[d]).concat(
    Object.keys(divGroups).filter(d=>!DIVS.includes(d))

  const timeHourMarks=Array.from({length:totalHrs+1},(_,i)=>{
    const hr=startHr+i;
    const label=hr===12?'12PM':hr>12?`${hr-12}PM`:hr===0?'12AM':`${hr}AM`;
    return`<div style="position:absolute;left:${i*pxPerHr}px;top:20px;height:16px;border-left:1px solid var(--bdr);padding:0 3px;font-size:9px;color:var(--muted);white-space:nowrap">${label}</div>`;
  }).join('');

  const dayHeaders=dates.map(date=>{

  const timeHeader=`<div style="display:flex;position:sticky;top:0;z-index:10;background:var(--white);border-bottom:2px solid var(--bdr)">
    <div style="width:${labelW}px;min-width:${labelW}px;padding:8px 12px;font-size:11px;font-weight:600;

  // Render each division group
  const divRows=sortedDivs.map(div=>{
    const group=divGroups[div];
    const isCollapsed=_dispCollapsed.includes(div);

      return`<div style="display:flex;border-bottom:1px solid var(--bdr)">

    return`<div style="border:1px solid var(--bdr);border-radius:8px;margin-bottom:10px;overflow:hidden">
      ${divHeader}

  }).join('');

  return`<div style="min-width:${labelW+totalWidth*days+40}px">
    ${timeHeader}
    ${divRows}
  </div>`;
}

// Division drag-to-reorder
let _divDragSource=null;
function divDragStart(e,div){
  _divDragSource=div;
  e.dataTransfer.effectAllowed='move';
  e.stopPropagation();
}
function divDrop(e,targetDiv){
  e.preventDefault(); e.stopPropagation();
  if(!_divDragSource||_divDragSource===targetDiv) return;
  const srcIdx=DIVS.indexOf(_divDragSource);
  const tgtIdx=DIVS.indexOf(targetDiv);
  if(srcIdx<0||tgtIdx<0){_divDragSource=null;return;}
  // Move src to target position
  DIVS.splice(srcIdx,1);
  DIVS.splice(tgtIdx,0,_divDragSource);
  // Persist order
  const order={};
  DIVS.forEach((d,i)=>{ order[d]=i; });
  try{localStorage.setItem('lms_disp_order',JSON.stringify(order));}catch{}
  tst(`${_divDragSource} moved`,'success');
  _divDragSource=null;
  showPage('dispatch');
}

function divDragOver(e,targetDiv){
  if(_divDragSource&&_divDragSource!==targetDiv) e.preventDefault();
}

// Drag and drop
function dispDragStart(e,aptId,woId,techName){
  _dragApt={aptId,woId,techName};
  e.dataTransfer.effectAllowed='move';
  e.target.style.opacity='0.5';
}
function dispDragEnd(e){ e.target.style.opacity='1'; _dragApt=null; }

async function dispDrop(e,newTech,newDiv){
  e.preventDefault();
  if(!_dragApt) return;
  const {aptId,woId,techName}=_dragApt;
  if(techName===newTech) return;

  // Get drop X position to calculate new time
  const rect=e.currentTarget.querySelector('[style*="position:relative"]')?.getBoundingClientRect();
  if(rect){
    const pxPerHr=80, startHr=6, labelW=180;
    const relX=e.clientX-rect.left;
    const newHr=Math.max(startHr,Math.min(20,startHr+relX/pxPerHr));
    const hrs=Math.floor(newHr);
    const mins=Math.round((newHr-hrs)*60/15)*15;
    const newTime=`${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}`;

    // Update appointment time
    const apts=S.get('lhs:appointments')||[];
    const apt=apts.find(a=>a.id===aptId);
    if(apt){
      apt.scheduled_time=newTime;
      S.set('lhs:appointments',apts);
      if(apt.id) await dbUpdate('lhs:appointments',apt.id,{scheduled_time:newTime});
    }
  }

  // Reassign tech
  const techs=S.get('lhs:apt_techs')||[];
  const techRow=techs.find(t=>t.appointment_id===aptId&&t.tech_name===techName);
  if(techRow){
    const newUser=(S.get('lhs:users')||[]).find(u=>u.name===newTech);
    techRow.tech_name=newTech;
    techRow.tech_email=newUser?.email||'';
    techRow.vehicle_id=newUser?.loc||'';
    S.set('lhs:apt_techs',techs);
    if(techRow.id) await dbUpdate('lhs:apt_techs',techRow.id,{tech_name:newTech,tech_email:techRow.tech_email,vehicle_id:techRow.vehicle_id});
  }

  tst(`Appointment moved to ${newTech}`,'success');
  showPage('dispatch');
}

function svAddGreyBlock(){
  const type=v('gb-type')||'Other';
  const customLabel=v('gb-label');
  const label=customLabel||type;
  const techRaw=v('gb-tech');
  const tech=techRaw.includes(' (')?techRaw.split(' (')[0]:techRaw;
  const dateFrom=document.getElementById('gb-date-from')?.value;
  const dateTo=document.getElementById('gb-date-to')?.value;
  if(!tech||!dateFrom){tst('Technician and start date required','error');return}
  const locked=document.getElementById('gb-lock')?.checked||false;
  const isPTO=type==='PTO'||type==='UTO';
  const time=v('gb-time')||'08:00';
  const dur=(()=>{const s=time;const e=v('gb-end')||'09:00';const[sh,sm]=s.split(':').map(Number);const[eh,em]=e.split(':').map(Number);return Math.max(15,(eh*60+em)-(sh*60+sm));})();

  // Build list of dates to create blocks for
  const dates=[];
  if(!dateTo||dateTo<=dateFrom){
    dates.push(dateFrom);
  } else {
    // Multi-day: get selected days of week
    const dowEls=document.querySelectorAll('.gb-dow:checked');
    const selectedDows=new Set([...dowEls].map(el=>parseInt(el.value)));
    const cur=new Date(dateFrom+'T12:00:00');
    const end=new Date(dateTo+'T12:00:00');
    while(cur<=end){
      if(selectedDows.has(cur.getDay())) dates.push(cur.toISOString().split('T')[0]);
      cur.setDate(cur.getDate()+1);
    }
  }
  if(!dates.length){tst('No matching dates — check day selections','error');return}

  const blocks=JSON.parse(localStorage.getItem('lms_grey_blocks')||'[]');
  const groupId='grp_'+Date.now();
  dates.forEach((date,i)=>{
    blocks.push({
      id:Date.now().toString()+'_'+i,
      group_id:groupId,
      label,type,tech,date,time,duration:dur,
      color:'#90A4AE',locked,is_pto:isPTO,
      created_by:CU?.name||'',
    });
  });
  try{localStorage.setItem('lms_grey_blocks',JSON.stringify(blocks));}catch{}
  cMod();
  if(isPTO) tst(`${type} — ${dates.length} day${dates.length!==1?'s':''} added for ${tech} — flagged on timesheet`,'info');
  else tst(`${dates.length} task block${dates.length!==1?'s':''} added for ${tech}`,'success');
  showPage('dispatch');
}

function delGreyBlock(id,deleteGroup=false){
  const blocks=JSON.parse(localStorage.getItem('lms_grey_blocks')||'[]');
  const b=blocks.find(x=>x.id===id);
  if(!b) return;
  if(b.locked&&!BLOCK_LOCKED_ROLES.includes(CU?.role)){
    tst('This block is manager-locked. Contact a manager to remove it.','error');
    return;
  }
  const isGroup=b.group_id&&blocks.filter(x=>x.group_id===b.group_id).length>1;
  if(deleteGroup&&isGroup){
    if(!confirm('Delete ALL '+blocks.filter(x=>x.group_id===b.group_id).length+' blocks in this series?')) return;
    const updated=blocks.filter(x=>x.group_id!==b.group_id);
    try{localStorage.setItem('lms_grey_blocks',JSON.stringify(updated));}catch{}
  } else {
    if(isGroup){
      const choice=confirm('This block is part of a multi-day series.\nOK = Delete just this day\nCancel = Delete entire series');
      if(choice===null) return;
      if(!choice){
        const updated=blocks.filter(x=>x.group_id!==b.group_id);
        try{localStorage.setItem('lms_grey_blocks',JSON.stringify(updated));}catch{}
      } else {
        const updated=blocks.filter(x=>x.id!==id);
        try{localStorage.setItem('lms_grey_blocks',JSON.stringify(updated));}catch{}
      }
    } else {
      if(!confirm('Delete this task block?')) return;
      const updated=blocks.filter(x=>x.id!==id);
      try{localStorage.setItem('lms_grey_blocks',JSON.stringify(updated));}catch{}
    }
  }
  cMod(); showPage('dispatch');
}

function bWorkOrders(){
  const wos=S.get('lhs:work_orders')||[];

  const canCreate=['God View','Admin','Director','Regional Manager','Operations Manager','Dispatcher','Sales Rep'].includes(role);

  let filtered=wos;
  if(role==='Van Tech') filtered=wos.filter(w=>
    (S.get('lhs:apt_techs')||[]).some(t=>t.wo_id===w.id&&t.tech_email===CU.email));
  if(role==='Sales Rep') filtered=wos.filter(w=>w.created_by===CU.name||w.created_by===CU.email);
  // Apply advanced filters
  if(_wf.status&&_wf.status!=='all') filtered=filtered.filter(w=>w.status===_wf.status);
  if(_wf.division) filtered=filtered.filter(w=>w.division===_wf.division);
  if(_wf.job_type) filtered=filtered.filter(w=>w.job_type===_wf.job_type);
  if(_wf.tech){
    const allAptTechs=S.get('lhs:apt_techs')||[];
    const allApts=S.get('lhs:appointments')||[];
    filtered=filtered.filter(w=>{
      const woAptIds=new Set(allApts.filter(a=>a.wo_id===w.id).map(a=>a.id));
      return allAptTechs.some(t=>t.tech_name===_wf.tech&&
        (t.wo_id===w.id||woAptIds.has(t.appointment_id)));

  if(_wf.date_from||_wf.date_to) filtered=filtered.filter(w=>{
    const woApts=(S.get('lhs:appointments')||[]).filter(a=>a.wo_id===w.id);
    if(!woApts.length) return false;
    return woApts.some(a=>{
      const d=a.scheduled_date||'';

    });
  });
  if(_wf.search){
    const q=_wf.search.toLowerCase();
    const qDigits=_wf.search.replace(/\D/g,'');
    filtered=filtered.filter(w=>
      (w.customer_name||'').toLowerCase().includes(q)||
      (qDigits.length>0&&(w.customer_phone||'').replace(/\D/g,'').includes(qDigits))||
      (w.wo_number||'').toLowerCase().includes(q)||
      (w.customer_address||'').toLowerCase().includes(q)||
      (w.customer_city||'').toLowerCase().includes(q)

        `<button class="btn btn-o sm wo-status-btn${(_wf.status||'all')===s?' wo-filter-active':''}"
          onclick="setWOFilter('status','${s}')">${s==='all'?'All ('+filtered.length+')':s+' ('+byStatus(s)+')'}</button>`).join('')}
    </div>
    ${canCreate?`<button class="btn btn-n" onclick="oCreateWO()">+ New Work Order</button>`:''}
  </div>

  <div style="background:var(--surf);border-radius:10px;padding:12px;margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
    <div class="fl" style="margin:0;min-width:130px"><label>Division</label>
      <select id="wof-div">
        <option value="">All Divisions</option>
        ${DIVS.map(d=>`<option${(_wf.division||'')=== d?' selected':''}>${d}</option>`).join('')}
      </select>
    </div>
    <div class="fl" style="margin:0;min-width:130px"><label>Job Type</label>
      <select id="wof-type">
        <option value="">All Types</option>
        ${JOB_TYPES_FIXED.map(t=>`<option${(_wf.job_type||'')=== t?' selected':''}>${t}</option>`).join('')}

    <button class="btn btn-o sm" onclick="clearWOFilters()">Clear</button>

function woFilter(status,btn){
  document.querySelectorAll('.wo-filter').forEach(b=>{b.classList.remove('active');b.style.background='';b.style.color='';});
  btn.classList.add('active');btn.style.background='var(--navy)';btn.style.color='var(--teal)';
  const wos=S.get('lhs:work_orders')||[];
  const filtered=status==='all'?wos:wos.filter(w=>w.status===status);
  const el=document.getElementById('wo-list');
  if(el) el.innerHTML=renderWOList(filtered,status);
}

function renderWOList(wos,status){
  if(!wos.length) return`<div class="card" style="text-align:center;padding:32px;color:var(--muted)">No work orders found.</div>`;
  return`<div class="card" style="padding:0"><div class="tw"><table>
  <thead><tr><th>WO #</th><th>Customer</th><th>Division</th><th>Job Type</th><th>Status</th><th>Scheduled</th><th>Total</th><th>Balance</th><th>Tech(s)</th><th></th></tr></thead>
  <tbody>${wos.map(wo=>{
    const apts=(S.get('lhs:appointments')||[]).filter(a=>a.wo_id===wo.id);
    const techs=(S.get('lhs:apt_techs')||[]).filter(t=>t.wo_id===wo.id);
    const nextApt=apts.find(a=>a.status==='Scheduled')||apts[0];
    const uniqueTechs=[...new Set(techs.map(t=>t.tech_name))];
    const statusColor=wo.status==='Completed'||wo.status==='Closed with Dispatch'?'bg':wo.status==='In Progress'?'bb':wo.status==='Cancelled'?'br':'ba';
    const balance=(wo.total_price||0)-(wo.total_paid||0);
    return`<tr style="cursor:pointer" onclick="openWO('${wo.id}')">
      <td style="font-family:'DM Mono',monospace;font-weight:700;color:var(--navy)">${wo.wo_number}</td>
      <td style="font-weight:500">${wo.customer_name||'—'}${(wo.customer_city||wo.customer_state)?`<span style="font-weight:400;color:var(--muted);font-size:12px"> &middot; ${[wo.customer_city,wo.customer_state].filter(Boolean).join(', ')}</span>`:''}</td>
      <td>${bx(wo.division||'—','bn')}</td>
      <td style="font-size:12px">${wo.job_type||'—'}<br><span style="color:var(--muted)">${wo.job_subtype||''}</span></td>
      <td>${bx(wo.status||'Scheduled',statusColor)}</td>
      <td style="font-size:12px;color:var(--muted)">${nextApt?.scheduled_date||'—'}<br>${nextApt?.arrival_window||''}</td>
      <td style="font-family:'DM Mono',monospace">$${(wo.total_price||0).toFixed(2)}</td>
      <td style="font-family:'DM Mono',monospace;color:${balance>0?'var(--red)':'var(--green)'}">$${balance.toFixed(2)}</td>
      <td style="font-size:12px">${uniqueTechs.slice(0,2).join(', ')+(uniqueTechs.length>2?` +${uniqueTechs.length-2}`:'')}</td>
      <td><button class="btn sm btn-n" onclick="event.stopPropagation();openWO('${wo.id}')">Open</button></td>
    </tr>`;}).join('')}
  </tbody></table></div></div>`;
}

// WO form helpers
function wocDivChange(div){
  window._woDiv=div;
  window._woSub='';
  window._woType=document.getElementById('woc-type')?.value||'Installation';
  // Only rebuild subtypes/classifications - don't wipe customer data
  const subs=getSubtypes(div,window._woType);
  const subSel=document.getElementById('woc-sub');
  if(subSel){
    subSel.innerHTML='<option value="">— Select —</option>'+subs.map(s=>`<option>${s}</option>`).join('');
  }
  const clsSel=document.getElementById('woc-cls');
  if(clsSel) clsSel.innerHTML='<option value="">— Select subtype first —</option>';
  // Update WO number preview
  wocUpdatePreview();
}
function wocUpdatePreview(){
  const div=document.getElementById('woc-div')?.value||window._woDiv||DIVS[0];
  const code=DIV_CODES[div]||'XX';
  const dateVal=document.getElementById('woc-adate')?.value||new Date().toISOString().split('T')[0];
  const year=parseInt(dateVal.split('-')[0])||new Date().getFullYear();
  const el=document.getElementById('wo-preview');
  if(el) el.textContent=`${year}-${code}-?????`;
}
function wocTypeChange(type){
  window._woType=type;
  window._woSub='';
  const div=document.getElementById('woc-div')?.value||window._woDiv||window._DIVS?.[0];
  const subs=getSubtypes(div,type);
  const subSel=document.getElementById('woc-sub');
  if(subSel) subSel.innerHTML='<option value="">— Select —</option>'+subs.map(s=>`<option>${s}</option>`).join('');
  const clsSel=document.getElementById('woc-cls');
  if(clsSel) clsSel.innerHTML='<option value="">— Select subtype first —</option>';
}
function wocSubChange(sub){
  window._woSub=sub;
  const classes=getClassifications(window._woDiv,window._woType,sub);
  const sel=document.getElementById('woc-cls'); if(!sel) return;
  sel.innerHTML='<option value="">— Select —</option>'+classes.map(c=>`<option>${c}</option>`).join('');
}
function wocSyncPrice(){
  const total=parseFloat(document.getElementById('woc-price')?.value)||0;
  const aprice=document.getElementById('woc-aprice');
  if(aprice&&!aprice.value) aprice.value=total.toFixed(2);
}

// Customer search
window._wocSelectedCust=null;
window._wocTechs=[];

function wocSearchCust(q){
  if(q.length<2){document.getElementById('woc-cresults').style.display='none';return}
  const custs=S.get('lhs:customers')||[];
  const matches=custs.filter(c=>{
    const name=`${c.first_name||''} ${c.last_name||''}`.toLowerCase();
    const ph=(c.phone||'').replace(/\D/g,'');
    return name.includes(q.toLowerCase())||ph.includes(q.replace(/\D/g,''));
  }).slice(0,8);
  const res=document.getElementById('woc-cresults');
  if(!matches.length){res.style.display='none';return}
  res.style.display='block';
  res.innerHTML=matches.map(c=>`
    <div style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--bdr);font-size:13px"
      onmousedown="wocSelectCust('${c.id}')"
      onmouseover="this.style.background='var(--surf)'" onmouseout="this.style.background=''">
      <strong>${c.first_name} ${c.last_name}</strong>${c.company?' — '+c.company:''}
      <span style="color:var(--muted);margin-left:8px">${c.phone||''}</span>
      <div style="font-size:11px;color:var(--muted)">${c.address||''} ${c.city||''} ${c.state||''}</div>
    </div>`).join('');
}

function wocSelectCust(id){
  const c=(S.get('lhs:customers')||[]).find(x=>x.id===id);
  if(!c) return;
  window._wocSelectedCust=c;
  document.getElementById('woc-cresults').style.display='none';
  document.getElementById('woc-cform').style.display='none';
  document.getElementById('woc-csearch').style.display='none';
  const sel=document.getElementById('woc-cselected');
  sel.style.display='block';
  document.getElementById('woc-csel-name').textContent=`${c.first_name} ${c.last_name}${c.company?' ('+c.company+')':''}`;
  document.getElementById('woc-csel-info').textContent=`${c.phone||''} | ${c.address||''} ${c.city||''} ${c.state||''} ${c.zip||''}`;
}

function wocClearCust(){
  window._wocSelectedCust=null;
  document.getElementById('woc-cform').style.display='block';
  document.getElementById('woc-csearch').style.display='block';
  document.getElementById('woc-cselected').style.display='none';
}

function wocAddTech(val){
  if(!val) return;
  const [email,name,loc]=val.split('|');
  if(window._wocTechs.find(t=>t.email===email)) return;
  window._wocTechs.push({email,name,loc});
  const list=document.getElementById('woc-techs-list');
  if(!list) return;
  list.innerHTML=window._wocTechs.map((t,i)=>`
    <span style="background:var(--navy);color:var(--teal);padding:4px 10px;border-radius:20px;font-size:12px;display:flex;align-items:center;gap:6px">
      ${t.name}
      <button onclick="wocRemoveTech(${i})" style="background:none;border:none;color:var(--teal);cursor:pointer;font-size:14px;line-height:1">&#215;</button>
    </span>`).join('');
  document.getElementById('woc-addtech').value='';
}

function wocRemoveTech(i){
  window._wocTechs.splice(i,1);
  const list=document.getElementById('woc-techs-list');
  if(list) list.innerHTML=window._wocTechs.length?window._wocTechs.map((t,i2)=>`
    <span style="background:var(--navy);color:var(--teal);padding:4px 10px;border-radius:20px;font-size:12px;display:flex;align-items:center;gap:6px">
      ${t.name}
      <button onclick="wocRemoveTech(${i2})" style="background:none;border:none;color:var(--teal);cursor:pointer;font-size:14px;line-height:1">&#215;</button>
    </span>`).join(''):'<span style="font-size:13px;color:var(--muted);line-height:24px">No techs assigned yet</span>';
}

// SAVE WORK ORDER
async function svCreateWO(){
  const div=v('woc-div'); const type=v('woc-type'); const sub=v('woc-sub'); const cls=v('woc-cls');
  if(!div||!type){tst('Division and Job Type required','error');return}

  // Get or create customer
  let cust=window._wocSelectedCust;
  if(!cust){
    const fn=v('woc-cfn'),ln=v('woc-cln'),ph=v('woc-cph');
    if(!fn||!ln){tst('Customer first and last name required','error');return}
    const stateVal=v('woc-cst')||'';
    const stateCode=stateVal.includes(' - ')?stateVal.split(' - ')[0]:stateVal;
    const newCust={
      first_name:fn,
      last_name:ln,
      company:v('woc-cco')||null,
      phone:ph||null,
      email:v('woc-cem')||null,
      address:v('woc-cad')||null,
      city:v('woc-cct')||null,
      state:stateCode||null,
      zip:v('woc-czip')||null,
      region:Object.keys(REGIONS).find(r=>REGIONS[r].states.includes(stateCode))||null,
      source:'Manual',
    };
    console.log('Saving customer:', newCust);
    const savedCust=await dbInsert('lhs:customers',newCust);
    if(!savedCust){
      tst('Failed to save customer to database. Check console for details.','error');
      console.error('Customer save failed - check Supabase lhs_customers table columns');
      return;
    }
    cust=savedCust;
    const custs=S.get('lhs:customers')||[]; custs.push(cust); S.set('lhs:customers',custs);
  }

  // Generate WO number using the appointment year (not current year)
  const aptDateVal=v('woc-adate')||new Date().toISOString().split('T')[0];
  const woYear=parseInt(aptDateVal.split('-')[0])||new Date().getFullYear();
  const code=DIV_CODES[div]||'XX';
  let seq=1;
  try{
    const{data}=await DB.rpc('get_next_wo_seq',{p_year:woYear,p_code:code});
    if(data) seq=data;
  }catch{
    seq=(S.get('lhs:wo_seq_'+woYear+'_'+code)||0)+1;
    S.set('lhs:wo_seq_'+woYear+'_'+code,seq);
  }
  const woNum=`${woYear}-${code}-${String(seq).padStart(5,'0')}`;

  const totalPrice=parseFloat(document.getElementById('woc-price')?.value)||0;
  const deposit=parseFloat(document.getElementById('woc-deposit')?.value)||0;

  const wo={
    wo_number:woNum, wo_year:woYear,
    customer_id:cust.id,
    customer_name:`${cust.first_name} ${cust.last_name}${cust.company?' ('+cust.company+')':''}`,
    customer_phone:cust.phone||'',
    customer_email:cust.email||'',
    customer_address:cust.address||'',
    customer_city:cust.city||'',
    customer_state:cust.state||'',
    customer_zip:cust.zip||'',
    division:div, division_code:code,
    job_type:type, job_subtype:sub, job_classification:cls,
    description:v('woc-desc'),
    special_instructions:v('woc-inst'),
    priority:v('woc-pri'),
    is_flexible:v('woc-flex')==='true',
    status:'Scheduled',
    total_price:totalPrice,
    total_paid:deposit,
    material_cost:0,
    created_by:CU.name,
    created_at:new Date().toISOString(),
    updated_at:new Date().toISOString(),
  };

  const savedWO=await dbInsert('lhs:work_orders',wo);
  if(!savedWO){tst('Failed to save work order','error');return}
  wo.id=savedWO.id;

  // Create first appointment
  const apt={
    wo_id:savedWO.id,
    appointment_number:1,
    scheduled_date:v('woc-adate'),
    scheduled_time:v('woc-atime'),
    arrival_window:v('woc-awin'),
    estimated_duration:(()=>{const s=v('woc-atime')||'08:00';const e=v('woc-aend')||'10:00';const[sh,sm]=s.split(':').map(Number);const[eh,em]=e.split(':').map(Number);return Math.max(15,(eh*60+em)-(sh*60+sm));})(),
    price:parseFloat(document.getElementById('woc-aprice')?.value)||totalPrice,
    status:'Scheduled',
    is_flexible:v('woc-flex')==='true',
    created_by:CU.name,
    created_at:new Date().toISOString(),
  };
  const savedApt=await dbInsert('lhs:appointments',apt);
  if(savedApt) apt.id=savedApt.id;

  // Assign techs to appointment
  for(const tech of (window._wocTechs||[])){
    const techRow={
      appointment_id:apt.id, wo_id:savedWO.id,
      tech_name:tech.name, tech_email:tech.email,
      vehicle_id:tech.loc, status:'Scheduled',
      created_at:new Date().toISOString(),
    };
    await dbInsert('lhs:apt_techs',techRow);
  }

  // Post deposit as payment if entered
  if(deposit>0){
    await dbInsert('lhs:payments',{
      wo_id:savedWO.id,appointment_id:apt.id,
      amount:deposit,payment_method:'Deposit',
      notes:'Initial deposit on WO creation',
      posted_by:CU.name,posted_at:new Date().toISOString(),
    });
  }

  // Update local caches
  const wos=S.get('lhs:work_orders')||[]; wos.unshift(savedWO); S.set('lhs:work_orders',wos);
  const apts=S.get('lhs:appointments')||[]; apts.push(apt); S.set('lhs:appointments',apts);

  // Log creation audit to timeline
  const techNames=(window._wocTechs||[]).map(t=>t.name).join(', ')||'None';
  logWOAudit(savedWO.id,'WO Created',`${woNum} | ${wo.division} | ${wo.job_type}${wo.job_subtype?' > '+wo.job_subtype:''} | Customer:${wo.customer_name} | ${wo.customer_city||''}${wo.customer_state?', '+wo.customer_state:''} | $${wo.total_price} | Techs:${techNames}`);
  if((window._wocTechs||[]).length) logWOAudit(savedWO.id,'Initial Appointment',`${wo.status} for ${v('woc-adate')} ${v('woc-awin')} | Techs:${techNames}`);
  window._wocSelectedCust=null; window._wocTechs=[];
  cMod();
  tst(`${woNum} created successfully`,'success');
  showPage('workorders');
}

        const seen=new Set(sessionAudit.map(a=>a.id));
        const entries=[...sessionAudit,...cacheAudit.filter(a=>!seen.has(a.id))];

        <div style="display:grid;grid-template-columns:140px 110px 1fr;gap:8px;padding:8px 12px;border-bottom:1px solid var(--bdr);font-size:11px;${ai%2?'background:var(--surf)':''}">
          <div style="color:var(--muted);white-space:nowrap">${new Date(a.created_at).toLocaleString()}</div>
          <div style="font-weight:600;color:var(--navy)">${a.actor}</div>
          <div><span style="font-weight:500">${a.action}</span>${a.detail?`<span style="color:var(--muted)"> — ${a.detail}</span>`:''}</div>
        </div>`).join('');

  <!-- WO Status update -->
  ${canEdit?`<div style="display:flex;gap:8px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--bdr);align-items:center">
    <span style="font-size:13px;color:var(--muted);line-height:32px">Status:</span>

    <div style="margin-left:auto;display:flex;gap:6px">
      <button class="btn sm btn-r" onclick="oWOAudit('${woId}')">&#9998; Creation Audit</button>

async function aptAddMaterial(aptId, woId){
  const sel=document.getElementById('aptd-msku');
  if(!sel?.value){tst('Select an item','error');return}
  const [sku,name,cost]=sel.value.split('|');
  const qty=parseInt(document.getElementById('aptd-mqty')?.value)||1;
  const unitCost=parseFloat(cost)||0;
  const mat={wo_id:woId,appointment_id:aptId,sku,item_name:name,
    qty_used:qty,unit_cost:unitCost,pulled_from:CU.loc||'',
    entered_by:CU.name,created_at:new Date().toISOString()};
  const saved=await dbInsert('lhs:wo_materials',mat);
  if(!saved){tst('Failed to save material','error');return}
  const vi=S.get('lhs:vi')||[];
  const vanRow=vi.find(r=>r.sku===sku&&(r.vehicle_id===CU.loc||r.vehicle===CU.loc));
  if(vanRow){
    const newQty=Math.max(0,(vanRow.qty_on_hand||vanRow.qty||0)-qty);
    vanRow.qty_on_hand=newQty;vanRow.qty=newQty;S.set('lhs:vi',vi);
    if(vanRow.id) await dbUpdate('lhs:vi',vanRow.id,{qty_on_hand:newQty});
    tst(`${name} x${qty} logged & deducted from van`,'success');
  } else {
    tst(`${name} x${qty} logged`,'info');
  }
  const mats=S.get('lhs:wo_materials')||[];mats.push(saved);S.set('lhs:wo_materials',mats);
  const wos=S.get('lhs:work_orders')||[];
  const wo=wos.find(w=>w.id===woId);
  if(wo){wo.material_cost=(wo.material_cost||0)+(qty*unitCost);S.set('lhs:work_orders',wos);}
  const list=document.getElementById('aptd-matlist');
  if(list) list.innerHTML=(S.get('lhs:wo_materials')||[]).filter(m=>m.appointment_id===aptId).map(m=>`
    <div style="display:flex;justify-content:space-between;padding:6px 10px;border:1px solid var(--bdr);border-radius:6px;margin-bottom:4px;font-size:13px">
      <span>${m.item_name||m.sku}</span><span>Qty: ${m.qty_used}</span>
      <span style="font-family:'DM Mono',monospace">$${((m.qty_used||0)*(m.unit_cost||0)).toFixed(2)}</span>
    </div>`).join('');
}

async function svAptDetail(aptId, woId){
  const pct=parseInt(document.getElementById('aptd-pct')?.value)||0;
  const status=v('aptd-status');
  const notes=v('aptd-notes');
  const newDate=v('aptd-date');
  const newTime=v('aptd-time');
  const newWin=v('aptd-win');
  const apts=S.get('lhs:appointments')||[];
  const apt=apts.find(a=>a.id===aptId);
  const _aptStart=newTime||apt?.scheduled_time||'08:00';
  const _aptEnd=v('aptd-end');
  const newDur=_aptEnd?(()=>{const[sh2,sm2]=_aptStart.split(':').map(Number);const[eh2,em2]=_aptEnd.split(':').map(Number);return Math.max(15,(eh2*60+em2)-(sh2*60+sm2));})():(apt?.estimated_duration||120);
  // If marked Completed, force 100%
  const finalPct=status==='Completed'?100:pct;
  const updates={pct_complete:finalPct,status,completion_notes:notes,updated_at:new Date().toISOString()};
  if(newDate) updates.scheduled_date=newDate;
  if(newTime) updates.scheduled_time=newTime;
  if(newWin)  updates.arrival_window=newWin;
  if(newDur)  updates.estimated_duration=newDur;
  if(apt){Object.assign(apt,updates);}
  S.set('lhs:appointments',apts);
  if(apt?.id) await dbUpdate('lhs:appointments',apt.id,updates);
  // Recalculate WO completion
  const allApts=(S.get('lhs:appointments')||[]).filter(a=>a.wo_id===woId);
  const woPct=Math.round(allApts.reduce((s,a)=>s+(a.pct_complete||0),0)/Math.max(1,allApts.length));
  const wos=S.get('lhs:work_orders')||[];
  const wo2=wos.find(w=>w.id===woId);
  if(wo2){
    wo2.pct_complete=woPct;
    // Auto-complete WO if all apts done
    if(allApts.length&&allApts.every(a=>a.status==='Completed'||a.pct_complete>=100)){
      if(wo2.status==='In Progress'||wo2.status==='Scheduled') wo2.status='Completed';
    }
    S.set('lhs:work_orders',wos);
    await dbUpdate('lhs:work_orders',woId,{pct_complete:woPct,status:wo2.status});
  }
  logWOAudit(woId,'Appointment Updated',`Status:${status} | ${finalPct}%`);
  cMod();tst('Appointment updated','success');openWO(woId);
}

async function aptUploadPhotos(aptId,woId,input){
  const files=Array.from(input.files);
  if(!files.length) return;
  const photos=S.get('lhs:wo_photos')||[];
  const existing=photos.filter(p=>p.appointment_id===aptId).length;
  let uploaded=0,failed=0,usedStorage=false;

  for(let i=0;i<files.length;i++){
    const file=files[i];
    const photoNum=existing+i+1;
    const ts=Date.now();
    const safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const storagePath=`photos/${woId}/${aptId}/${ts}_${safeName}`;
    tst(`Uploading ${i+1}/${files.length}...`,'info');

    let photoUrl=null,storagePath2=null,bucket=null;

    // 1. Try Supabase Storage (needs 'wo-photos' bucket created in dashboard)
    try{
      const{data:upData,error:upErr}=await DB.storage.from('wo-photos').upload(storagePath,file,{
        cacheControl:'31536000',upsert:false,contentType:file.type||'image/jpeg'
      });
      if(!upErr){
        const{data:urlData}=DB.storage.from('wo-photos').getPublicUrl(storagePath);
        photoUrl=urlData?.publicUrl;
        storagePath2=storagePath;bucket='wo-photos';usedStorage=true;
      }
    }catch(e){console.warn('Storage upload:',e.message);}

    // 2. Fallback: base64 in cache (limited by localStorage ~5MB)
    if(!photoUrl){
      photoUrl=await new Promise(res=>{
        const r=new FileReader();
        r.onload=e=>res(e.target.result);
        r.onerror=()=>res(null);
        r.readAsDataURL(file);
      });
    }
    if(!photoUrl){failed++;continue;}

    const photo={
      id:'photo_'+ts+'_'+i,
      wo_id:woId,appointment_id:aptId,photo_url:photoUrl,
      storage_path:storagePath2,storage_bucket:bucket,
      photo_number:photoNum,file_name:file.name,
      file_size:file.size,mime_type:file.type,
      uploaded_by:CU.name,uploaded_at:new Date().toISOString(),flags:[],
    };

    // Save row to Supabase DB
    try{
      const{data:dbData,error:dbErr}=await DB.from('lhs_wo_photos').insert({
        wo_id:woId,appointment_id:aptId,photo_url:photoUrl,
        storage_path:storagePath2,storage_bucket:bucket,
        photo_number:photoNum,file_name:file.name,
        file_size:file.size,mime_type:file.type,
        uploaded_by:CU.name,uploaded_at:photo.uploaded_at,
      }).select().single();
      if(!dbErr&&dbData) photo.id=dbData.id;
    }catch(e){console.warn('Photo DB:',e.message);}

    photos.push(photo);
    uploaded++;
  }
  S.set('lhs:wo_photos',photos);
  refreshPhotoList(aptId,woId,photos);
  if(failed) tst(`${uploaded} uploaded, ${failed} failed`,'warning');
  else tst(`${uploaded} photo${uploaded!==1?'s':''} saved${usedStorage?' to cloud':' locally'}`,uploaded?'success':'error');
}

async function aptDispatchTech(techId,aptId,woId){
  const techs=S.get('lhs:apt_techs')||[];
  const t=techs.find(x=>x.id===techId);
  if(t){t.status='Dispatched';t.dispatched_at=new Date().toISOString();}
  S.set('lhs:apt_techs',techs);
  await dbUpdate('lhs:apt_techs',techId,{status:'Dispatched',dispatched_at:new Date().toISOString()});
  const apts=S.get('lhs:appointments')||[];
  const apt=apts.find(a=>a.id===aptId);
  if(apt&&apt.status==='Scheduled'){apt.status='En Route';S.set('lhs:appointments',apts);
    await dbUpdate('lhs:appointments',aptId,{status:'En Route'});}
  logWOAudit(woId,'Tech Dispatched',`${t?.tech_name} en route`);
  tst(`${t?.tech_name||'Tech'} dispatched!`,'success');
  oAptDetail(aptId,woId);
}

async function aptArriveTech(techId,aptId,woId){
  const techs=S.get('lhs:apt_techs')||[];
  const t=techs.find(x=>x.id===techId);
  if(t){t.status='On Site';t.arrived_at=new Date().toISOString();}
  S.set('lhs:apt_techs',techs);
  await dbUpdate('lhs:apt_techs',techId,{status:'On Site',arrived_at:new Date().toISOString()});
  const apts=S.get('lhs:appointments')||[];
  const apt=apts.find(a=>a.id===aptId);
  if(apt){apt.status='On Site';S.set('lhs:appointments',apts);
    await dbUpdate('lhs:appointments',aptId,{status:'On Site'});}
  // Auto-update WO to In Progress when first tech arrives
  const wos=S.get('lhs:work_orders')||[];
  const wo=wos.find(w=>w.id===woId);
  if(wo&&wo.status==='Scheduled'){
    wo.status='In Progress';
    S.set('lhs:work_orders',wos);
    await dbUpdate('lhs:work_orders',woId,{status:'In Progress'});
  }
  logWOAudit(woId,'Tech Arrived',`${t?.tech_name} on site`);
  tst(`${t?.tech_name||'Tech'} arrived on site — WO set to In Progress`,'success');
  oAptDetail(aptId,woId);
}

async function aptCancelDispatch(techId,aptId,woId){
  if(!confirm('Undo dispatch? This resets the tech back to Scheduled.')) return;
  const techs=S.get('lhs:apt_techs')||[];
  const t=techs.find(x=>x.id===techId);
  if(t){t.status='Scheduled';t.dispatched_at=null;t.arrived_at=null;}
  S.set('lhs:apt_techs',techs);
  await dbUpdate('lhs:apt_techs',techId,{status:'Scheduled',dispatched_at:null,arrived_at:null});
  tst('Dispatch cancelled','info');
  oAptDetail(aptId,woId);
}

async function aptRemoveTech(techId,aptId,woId){
  const techs=S.get('lhs:apt_techs')||[];
  const t=techs.find(x=>x.id===techId);
  if(!t) return;
  if(!confirm(`Remove ${t.tech_name} from this appointment?`)) return;
  await dbDelete('lhs:apt_techs',techId);
  const idx=techs.indexOf(t);if(idx>=0) techs.splice(idx,1);
  S.set('lhs:apt_techs',techs);
  tst(`${t.tech_name} removed`,'info');
  oAptDetail(aptId,woId);
}

async function aptAddTechInline(aptId,woId){
  const val=document.getElementById('aptd-addtech')?.value;
  if(!val){tst('Select a technician','error');return}
  const [email,name,loc]=val.split('|');
  const techs=S.get('lhs:apt_techs')||[];
  if(techs.find(t=>t.appointment_id===aptId&&t.tech_email===email)){
    tst(`${name} is already on this appointment`,'error');return;
  }
  const newTech={appointment_id:aptId,wo_id:woId,tech_name:name,tech_email:email,
    vehicle_id:loc,status:'Scheduled',created_at:new Date().toISOString()};
  const saved=await dbInsert('lhs:apt_techs',newTech);
  if(!saved){tst('Failed to add tech','error');return}
  techs.push(saved);S.set('lhs:apt_techs',techs);
  logWOAudit(woId,'Tech Assigned',`${name} added to appointment`);
  tst(`${name} added`,'success');
  oAptDetail(aptId,woId);
}

async function svPostPayment(woId){
  const amt=parseFloat(document.getElementById('pp-amt')?.value)||0;
  if(!amt){tst('Enter a payment amount','error');return}
  const method=v('pp-method');const ref=v('pp-ref');
  const aptId=v('pp-apt')||null;const notes=v('pp-notes');
  const payment={wo_id:woId,appointment_id:aptId||null,amount:amt,
    payment_method:method,reference_number:ref,notes,
    posted_by:CU.name,posted_at:new Date().toISOString()};

async function svWOAudit(woId){
  const fields=['ca-div','ca-type','ca-sub','ca-cls','ca-cust','ca-addr','ca-price','ca-inst'];
  const fieldNames=['correct_division','correct_job_type','correct_job_subtype',
    'correct_job_classification','customer_info_complete','address_verified',
    'pricing_correct','special_instructions_clear'];
  const noteFields=['division_note','job_type_note','subtype_note','classification_note',
    'customer_note','address_note','pricing_note','instructions_note'];
  const audit={wo_id:woId,audited_by:CU.name,audited_at:new Date().toISOString()};
  let passes=0,fails=0;
  fields.forEach((fid,i)=>{
    const failBtn=document.getElementById(fid+'-fail');
    const isFailed=failBtn?.style.background==='var(--red)'||failBtn?.style.background.includes('red');
    audit[fieldNames[i]]=!isFailed;
    audit[noteFields[i]]=isFailed?v(fid+'-note'):'';
    if(!isFailed) passes++; else fails++;
  });
  audit.pass_count=passes;audit.fail_count=fails;audit.overall_pass=fails===0;
  audit.coaching_notes=v('ca-coaching');
  const saved=await dbInsert('lhs:wo_creation_audit',audit);
  if(!saved){tst('Failed to save audit','error');return}
  const score=Math.round((passes/(passes+fails))*100);
  const wos=S.get('lhs:work_orders')||[];
  const wo=wos.find(w=>w.id===woId);
  if(wo){wo.creation_audit_score=score;wo.creation_audit_by=CU.name;S.set('lhs:work_orders',wos);}
  await dbUpdate('lhs:work_orders',woId,{creation_audit_score:score,creation_audit_by:CU.name,
    creation_audit_at:new Date().toISOString()});
  cMod();tst(`Audit saved — ${score}% (${passes} pass, ${fails} fail)`,'success');openWO(woId);
}

// ── PHOTO VIEWER + SCORING RUBRIC ────────────────────────────────────────────
// Photo scoring: flag-based only. Score = 100 - (sum of pts * 10), min 0
// Advisory=1pt, Code Issue=3pts, Emergency=5pts
// Grade: 90-100=A, 75-89=B, 60-74=C, 40-59=D, 0-39=F
function calcPhotoScore(photos){
  const totalPts=photos.reduce((s,p)=>{
    return s+(p.flags||[]).reduce((fs,fid)=>{
      const fl=PHOTO_FLAGS.find(f=>f.id===fid);
      return fs+(fl?.pts||0);
    },0);
  },0);
  const score=Math.max(0,Math.min(100,100-totalPts*10));
  const letter=score>=90?'A':score>=75?'B':score>=60?'C':score>=40?'D':'F';
  const color=score>=90?'#2E7D32':score>=75?'#1565C0':score>=60?'#E65100':score>=40?'#F57F17':'#C62828';
  const label=score>=90?'Excellent':score>=75?'Acceptable':score>=60?'Marginal':score>=40?'Poor':'Failed';
  return{score,letter,color,label,totalPts};
}
const PHOTO_FLAGS=[
  {id:'advisory', label:'Advisory',color:'#F9A825',pts:1,desc:'Minor concern, no action required'},
  {id:'code',     label:'Code Issue',color:'#E65100',pts:3,desc:'Potential code violation'},
  {id:'emergency',label:'Emergency',color:'#C62828',pts:5,desc:'Immediate safety concern'},
];
const SAFETY_FLAGS=[
  {id:'safe',     label:'Safe',     pts:0,color:'#2E7D32',desc:'No safety concerns observed'},
  {id:'discuss',  label:'Discuss',  pts:1,color:'#F9A825',desc:'Safety topic to address with tech'},
  {id:'violation',label:'Violation',pts:2,color:'#C62828',desc:'Active safety violation — action required'},
];
function calcSafetyScore(photos){
  // 0 pts = 100%, 1 pt = discuss, 2 pts = violation
  // Score = 100 - (violations*50 + discusses*20), min 0
  const violations=photos.filter(p=>p.safety==='violation').length;
  const discusses=photos.filter(p=>p.safety==='discuss').length;
  const total=photos.length||1;
  const deduction=(violations*50)+(discusses*20);
  const score=Math.max(0,Math.min(100,100-deduction));
  const letter=score>=90?'A':score>=75?'B':score>=60?'C':score>=40?'D':'F';
  const color=score>=90?'#2E7D32':score>=75?'#1565C0':score>=60?'#E65100':score>=40?'#F57F17':'#C62828';
  const label=score>=90?'Safe':score>=75?'Acceptable':score>=60?'Review Required':score>=40?'Concerning':'Critical';
  return{score,letter,color,label,violations,discusses};
}

function savePhotoScore(photoId,aptId,woId,idx){
  const photos=S.get('lhs:wo_photos')||[];
  const p=photos.find(x=>x.id===photoId);
  if(!p) return;
  p.review_notes=document.getElementById('photo-notes-'+idx)?.value||'';
  p.reviewed_by=CU.name;
  p.reviewed_at=new Date().toISOString();
  S.set('lhs:wo_photos',photos);
  tst('Photo score saved','success');
  // Log audit
  const wo=(S.get('lhs:wo_photos')||[]).find(x=>x.id===photoId);
  viewPhoto(photoId,aptId,woId);
}

function togglePhotoFlag(photoId,aptId,woId,flagId,idx){
  const allPhotos=S.get('lhs:wo_photos')||[];
  const p=allPhotos.find(x=>x.id===photoId);
  if(!p) return;
  if(!p.flags) p.flags=[];
  const fi=p.flags.indexOf(flagId);
  if(fi>=0) p.flags.splice(fi,1); else p.flags.push(flagId);
  S.set('lhs:wo_photos',allPhotos);
  const aptPhotos=allPhotos.filter(x=>x.appointment_id===aptId);
  const newIdx=aptPhotos.findIndex(x=>x.id===photoId);
  renderPhotoViewer(aptPhotos,newIdx>=0?newIdx:idx,aptId,woId);
}

function setSafetyFlag(photoId,aptId,woId,flagId,idx){
  const allPhotos=S.get('lhs:wo_photos')||[];
  const p=allPhotos.find(x=>x.id===photoId);
  if(!p) return;
  p.safety=p.safety===flagId?null:flagId;
  p.safety_reviewed_by=CU.name;
  p.safety_reviewed_at=new Date().toISOString();
  S.set('lhs:wo_photos',allPhotos);
  const aptPhotos=allPhotos.filter(x=>x.appointment_id===aptId);
  const newIdx=aptPhotos.findIndex(x=>x.id===photoId);
  renderPhotoViewer(aptPhotos,newIdx>=0?newIdx:idx,aptId,woId);
}

function saveSafetyScore(photoId,aptId,woId,idx){
  const allPhotos=S.get('lhs:wo_photos')||[];
  const p=allPhotos.find(x=>x.id===photoId);
  if(!p) return;
  p.safety_notes=document.getElementById('safety-notes-'+idx)?.value||'';
  p.safety_reviewed_by=CU.name;
  p.safety_reviewed_at=new Date().toISOString();
  S.set('lhs:wo_photos',allPhotos);
  tst('Safety score saved','success');
  viewPhoto(photoId,aptId,woId);
}

function deletePhoto(photoId,aptId,woId){
  if(!confirm('Delete this photo? This cannot be undone.')) return;
  const photos=S.get('lhs:wo_photos')||[];
  const updated=photos.filter(p=>p.id!==photoId);
  S.set('lhs:wo_photos',updated);
  const remaining=updated.filter(p=>p.appointment_id===aptId);
  if(remaining.length) renderPhotoViewer(remaining,0,aptId,woId);
  else{cMod();tst('Photo deleted','info');}
}

async function svWONote(woId){
  const content=v('note-content').trim();
  if(!content){tst('Note cannot be empty','error');return}
  const wo=(S.get('lhs:work_orders')||[]).find(w=>w.id===woId);
  const woLabel=wo?.wo_number||woId;

  const notifSelects=document.querySelectorAll('.note-notif-check:checked');
  const recipients=[...notifSelects].map(el=>({email:el.value,name:el.dataset.name}));

  const note={
    wo_id:woId,
    content,
    note_type:v('note-type')||'General',
    is_internal:document.getElementById('note-internal')?.checked||false,
    author:CU.name,
    created_at:new Date().toISOString(),
  };

  // Save to Supabase FIRST — blocking, with real error feedback
  let savedNote=null;
  try{
    const{data,error}=await DB.from('lhs_wo_notes').insert(note).select().single();
    if(error) throw new Error(error.message);
    savedNote={...note,id:data.id};
  }catch(e){
    // Supabase failed — save to localStorage only as fallback and warn user
    savedNote={...note,id:'note_'+Date.now()+'_'+Math.random().toString(36).slice(2)};
    tst('Note saved locally — Supabase sync failed: '+e.message,'warning');
    console.warn('Note save failed:',e);
  }

  // Update localStorage cache
  const allNotes=S.get('lhs:wo_notes')||[];
  allNotes.push(savedNote);
  S.set('lhs:wo_notes',allNotes);

  // Update session store so it shows immediately without refresh
  if(!_NOTES[woId]) _NOTES[woId]=[];
  _NOTES[woId].unshift(savedNote);

  // Log audit
  logWOAudit(woId,'Note Added',`${savedNote.note_type}${savedNote.is_internal?' (internal)':''}${recipients.length?' — notified '+recipients.length+' user(s)':''}`);

  // Notifications
  for(const r of recipients){
    sendNotification({
      user_email:r.email,user_name:r.name,type:'note',
      title:`Note on ${woLabel}`,
      body:`${CU.name}: ${content.slice(0,100)}${content.length>100?'...':''}`,
      entity_type:'work_order',entity_id:woId,entity_label:woLabel,from_user:CU.name,
    });
  }

  if(savedNote.id&&!savedNote.id.startsWith('note_')){
    tst(`Note saved${recipients.length?' — '+recipients.length+' notified':''}`, 'success');
  }
  openWO(woId);
}

function ewoUpdateSubs(div,type,currentSub){

  ewoUpdateClasses(currentSub,div,type);
}

function ewoUpdateClasses(sub,div,type){
  const d=div||document.getElementById('ewo-div')?.value;
  const t=type||document.getElementById('ewo-type')?.value;
  const classes=sub?getClassifications(d,t,sub):[];

  if(clsSel) clsSel.innerHTML='<option value="">— Select —</option>'+classes.map(c=>`<option>${c}</option>`).join('');

async function svEditWODetails(woId){

  const stateRaw=v('ewo-cstate');
  const state=stateRaw.includes(' - ')?stateRaw.split(' - ')[0]:stateRaw;
  const prev={division:wo.division,job_type:wo.job_type,job_subtype:wo.job_subtype,
    job_classification:wo.job_classification,description:wo.description,
    special_instructions:wo.special_instructions,priority:wo.priority};
  const updates={
    division:v('ewo-div'),job_type:v('ewo-type'),
    job_subtype:v('ewo-sub')||'',job_classification:v('ewo-cls')||'',
    priority:v('ewo-pri'),is_flexible:v('ewo-flex')==='true',

    customer_city:v('ewo-ccity'),customer_state:state,customer_zip:v('ewo-czip'),
    updated_at:new Date().toISOString(),updated_by:CU.name,
  };
  Object.assign(wo,updates);
  S.set('lhs:work_orders',wos);
  await dbUpdate('lhs:work_orders',woId,updates);
  // Build change log
  const prev2={customer_name:wo.customer_name,customer_phone:wo.customer_phone,
    customer_email:wo.customer_email,customer_address:wo.customer_address,
    customer_city:wo.customer_city,customer_state:wo.customer_state};
  const changes=[];
  if(prev.division!==updates.division) changes.push(`Division: ${prev.division}→${updates.division}`);
  if(prev.job_type!==updates.job_type) changes.push(`Job Type: ${prev.job_type}→${updates.job_type}`);
  if(prev.job_subtype!==updates.job_subtype) changes.push(`Subtype: ${prev.job_subtype||'—'}→${updates.job_subtype||'—'}`);
  if(prev.priority!==updates.priority) changes.push(`Priority: ${prev.priority}→${updates.priority}`);
  if(prev.description!==updates.description) changes.push('Description updated');
  if(prev.special_instructions!==updates.special_instructions) changes.push('Special instructions updated');
  if(prev2.customer_name!==updates.customer_name) changes.push(`Customer name: ${prev2.customer_name}→${updates.customer_name}`);
  if(prev2.customer_phone!==updates.customer_phone) changes.push(`Phone: ${prev2.customer_phone||'—'}→${updates.customer_phone||'—'}`);

  if(prev2.customer_state!==updates.customer_state) changes.push(`State: ${prev2.customer_state||'—'}→${updates.customer_state||'—'}`);

function renderCustList(q){
  const custs=S.get('lhs:customers')||[];
  const ql=(q||'').toLowerCase();
  const filtered=!ql?custs:custs.filter(c=>
    `${c.first_name||''} ${c.last_name||''}`.toLowerCase().includes(ql)||
    (c.phone||'').replace(/\D/g,'').includes(q.replace(/\D/g,''))||
    (c.email||'').toLowerCase().includes(ql)||
    (c.address||'').toLowerCase().includes(ql)||
    (c.city||'').toLowerCase().includes(ql)||
    (c.company||'').toLowerCase().includes(ql)
  );
  const el=document.getElementById('cust-list');
  if(el) el.innerHTML=renderCustTable(filtered);
}

async function svAddCustomer(){
  const fn=v('cf-fn'),ln=v('cf-ln');
  if(!fn||!ln){tst('First and last name required','error');return}
  const state=v('cf-st');
  const region=Object.keys(REGIONS).find(r=>REGIONS[r].states.includes(state))||'';
  const c={first_name:fn,last_name:ln,company:v('cf-co')||null,
    phone:v('cf-ph')||null,email:v('cf-em')||null,
    address:v('cf-ad')||null,city:v('cf-ct')||null,
    state:state||null,zip:v('cf-zip')||null,
    region:region||null,division:v('cf-div')||null,
    notes:v('cf-notes')||null,source:'Manual'};
  const saved=await dbInsert('lhs:customers',c);
  if(!saved){tst('Failed to save customer','error');return}
  const custs=S.get('lhs:customers')||[];custs.unshift(saved);S.set('lhs:customers',custs);
  cMod();tst(`${fn} ${ln} added`,'success');showPage('customers');
}
